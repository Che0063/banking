<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Banking</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>
  <script src="https://unpkg.com/recharts@2.10.3/umd/Recharts.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.23.5/babel.min.js"></script>
  <script>window.addEventListener('error',function(e){if(e.target&&e.target.tagName==='SCRIPT'){document.getElementById('root').innerHTML='<div style="padding:40px;color:#c0392b"><h2>Script load failed</h2><p>'+e.target.src+'</p></div>';}},true);</script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#f7f6f3;--surface:#fff;--surface2:#f0ede8;--border:#e2ddd8;
      --text:#1a1714;--text2:#6b6460;--text3:#9e9894;
      --accent:#2d6a4f;--accent-light:#e8f4f0;--accent-hover:#245a42;
      --danger:#c0392b;--danger-light:#fdf0ee;
      --warn:#d4820a;--warn-light:#fef8ec;
      --income:#1a5276;--radius:10px;--radius-sm:6px;
      --shadow:0 1px 3px rgba(0,0,0,.07),0 1px 2px rgba(0,0,0,.05);
      --shadow-md:0 4px 12px rgba(0,0,0,.08),0 2px 4px rgba(0,0,0,.05);
    }
    body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5;min-height:100vh}
    .app{display:flex;min-height:100vh}
    .sidebar{width:220px;min-height:100vh;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:10}
    .sidebar-logo{padding:24px 20px 20px;border-bottom:1px solid var(--border)}
    .sidebar-logo h1{font-size:17px;font-weight:600;letter-spacing:-.3px}
    .sidebar-logo span{color:var(--accent)}
    .sidebar-nav{padding:12px 10px;flex:1}
    .nav-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:var(--radius-sm);cursor:pointer;font-size:13.5px;color:var(--text2);transition:all .15s;margin-bottom:2px;border:none;background:none;width:100%;text-align:left}
    .nav-item:hover{background:var(--surface2);color:var(--text)}
    .nav-item.active{background:var(--accent-light);color:var(--accent);font-weight:500}
    .main{margin-left:220px;flex:1;padding:32px;max-width:calc(100vw - 220px)}
    .page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:28px}
    .page-header h2{font-size:22px;font-weight:600;letter-spacing:-.4px}
    .page-header p{color:var(--text2);font-size:13px;margin-top:2px}
    .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow)}
    .card-padded{padding:20px}
    .stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;margin-bottom:24px}
    .stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px 20px;box-shadow:var(--shadow)}
    .stat-label{font-size:12px;color:var(--text3);font-weight:500;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
    .stat-value{font-size:26px;font-weight:600;letter-spacing:-.8px;font-family:'DM Mono',monospace}
    .stat-value.positive{color:var(--income)}.stat-value.negative{color:var(--danger)}.stat-value.warn{color:var(--warn)}
    .stat-sub{font-size:12px;color:var(--text3);margin-top:4px}
    .btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:var(--radius-sm);font-family:'DM Sans',sans-serif;font-size:13.5px;font-weight:500;cursor:pointer;border:none;transition:all .15s;white-space:nowrap}
    .btn-primary{background:var(--accent);color:white}.btn-primary:hover{background:var(--accent-hover)}
    .btn-secondary{background:var(--surface2);color:var(--text);border:1px solid var(--border)}.btn-secondary:hover{background:var(--border)}
    .btn-danger{background:var(--danger-light);color:var(--danger);border:1px solid #f5c6c2}.btn-danger:hover{background:#f9d7d4}
    .btn-sm{padding:5px 10px;font-size:12.5px}
    .btn-ghost{background:none;color:var(--text2);border:none;padding:5px 8px}.btn-ghost:hover{background:var(--surface2);color:var(--text)}
    .btn:disabled{opacity:.45;cursor:not-allowed}
    /* Table */
    .table-outer{overflow-x:auto;position:relative}
    table{width:100%;border-collapse:collapse;font-size:13.5px;table-layout:fixed}
    thead th{text-align:left;padding:0;font-size:11.5px;font-weight:600;text-transform:uppercase;letter-spacing:.4px;color:var(--text3);border-bottom:1px solid var(--border);white-space:nowrap;position:relative;background:var(--surface)}
    .th-inner{display:flex;align-items:center;gap:4px;padding:10px 14px;user-select:none}
    .th-sort{cursor:pointer}.th-sort:hover .th-inner{color:var(--text)}
    .th-resize{position:absolute;right:0;top:0;bottom:0;width:5px;cursor:col-resize;z-index:2}
    .th-resize:hover,.th-resize.dragging{background:var(--accent);opacity:.5}
    .th-filter-btn{background:none;border:none;cursor:pointer;color:var(--text3);padding:2px;border-radius:3px;line-height:1;display:flex;align-items:center}
    .th-filter-btn:hover,.th-filter-btn.active{color:var(--accent);background:var(--accent-light)}
    tbody tr{transition:background .1s}
    tbody tr:hover{background:var(--surface2)}
    tbody tr.selected-row{background:#fff8ec}
    tbody td{padding:11px 14px;border-bottom:1px solid var(--border);color:var(--text);vertical-align:middle;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    tbody tr:last-child td{border-bottom:none}
    .amount-cell{font-family:'DM Mono',monospace;font-size:13px}
    .amount-neg{color:var(--danger)}.amount-pos{color:var(--income)}
    .badge{display:inline-block;padding:2px 8px;border-radius:100px;font-size:11.5px;font-weight:500}
    .badge-pending{background:var(--warn-light);color:var(--warn)}
    .badge-transfer{background:#eef2ff;color:#4361ee}
    .badge-start{background:#f0ede8;color:var(--text2)}
    .badge-cat{background:var(--surface2);color:var(--text2)}
    /* Filter dropdown */
    .col-filter-popup{position:absolute;top:100%;left:0;z-index:50;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow-md);padding:12px;min-width:220px;max-width:280px}
    .col-filter-popup input[type=text],.col-filter-popup input[type=date],.col-filter-popup input[type=number]{width:100%;padding:7px 10px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:13px;margin-bottom:6px;font-family:'DM Sans',sans-serif}
    .col-filter-popup input:focus{outline:none;border-color:var(--accent)}
    .filter-values{max-height:160px;overflow-y:auto;margin-bottom:8px}
    .filter-val-row{display:flex;align-items:center;gap:8px;padding:3px 0;font-size:13px;cursor:pointer}
    .filter-val-row:hover{color:var(--accent)}
    /* Forms */
    .form-grid{display:grid;gap:14px}
    .form-grid-2{grid-template-columns:1fr 1fr}
    .form-grid-3{grid-template-columns:1fr 1fr 1fr}
    .form-group{display:flex;flex-direction:column;gap:5px}
    .form-label{font-size:12.5px;font-weight:500;color:var(--text2)}
    .form-input,.form-select{padding:9px 12px;border:1px solid var(--border);border-radius:var(--radius-sm);font-family:'DM Sans',sans-serif;font-size:13.5px;color:var(--text);background:var(--surface);transition:border-color .15s;width:100%}
    .form-input:focus,.form-select:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(45,106,79,.1)}
    .form-hint{font-size:11.5px;color:var(--text3)}
    /* Modal */
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.35);backdrop-filter:blur(2px);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px}
    .modal{background:var(--surface);border-radius:14px;box-shadow:var(--shadow-md);width:100%;max-width:520px;max-height:90vh;overflow-y:auto}
    .modal-lg{max-width:720px}
    .modal-xl{max-width:900px}
    .modal-header{display:flex;align-items:center;justify-content:space-between;padding:20px 24px 16px;border-bottom:1px solid var(--border)}
    .modal-header h3{font-size:16px;font-weight:600}
    .modal-body{padding:20px 24px}
    .modal-footer{padding:16px 24px;border-top:1px solid var(--border);display:flex;gap:10px;justify-content:flex-end}
    /* Split */
    .split-row{display:flex;align-items:center;gap:10px;background:var(--surface2);border-radius:var(--radius-sm);padding:12px 14px;margin-top:4px}
    .split-person{font-size:13px;font-weight:500;flex:1}
    .split-input{width:80px;padding:6px 10px;border:1px solid var(--border);border-radius:var(--radius-sm);font-family:'DM Mono',monospace;font-size:13px;text-align:right;background:white}
    .split-input:focus{outline:none;border-color:var(--accent)}
    .split-input.readonly{background:var(--surface2);color:var(--text2)}
    /* Misc */
    .pending-banner{background:var(--warn-light);border:1px solid #fce4b2;border-radius:var(--radius);padding:12px 16px;display:flex;align-items:center;gap:10px;margin-bottom:20px;font-size:13.5px;color:var(--warn)}
    .bulk-bar{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--warn-light);border:1px solid #fce4b2;border-radius:var(--radius);margin-bottom:12px;font-size:13.5px;color:var(--warn);font-weight:500;flex-wrap:wrap}
    .section-title{font-size:13px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:14px;margin-top:24px}
    .filter-bar{display:flex;gap:8px;align-items:center;margin-bottom:20px;flex-wrap:wrap}
    .filter-select{padding:7px 12px;border:1px solid var(--border);border-radius:var(--radius-sm);font-family:'DM Sans',sans-serif;font-size:13px;background:var(--surface);color:var(--text);cursor:pointer}
    .filter-select:focus{outline:none;border-color:var(--accent)}
    .toast{position:fixed;bottom:24px;right:24px;background:var(--text);color:white;padding:12px 18px;border-radius:var(--radius);font-size:13.5px;font-weight:500;z-index:200;box-shadow:var(--shadow-md);animation:slideUp .2s ease}
    @keyframes slideUp{from{transform:translateY(12px);opacity:0}to{transform:translateY(0);opacity:1}}
    .empty-state{text-align:center;padding:48px 24px;color:var(--text3)}
    .upload-area{border:2px dashed var(--border);border-radius:var(--radius);padding:32px;text-align:center;cursor:pointer;transition:all .15s;display:block}
    .upload-area:hover{border-color:var(--accent);background:var(--accent-light)}
    .upload-area p{color:var(--text2);font-size:14px;margin-top:8px}
    .upload-area small{color:var(--text3);font-size:12px}
    .lock-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg)}
    .lock-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:40px;width:100%;max-width:360px;box-shadow:var(--shadow-md);text-align:center}
    .lock-card h1{font-size:22px;font-weight:600;margin-bottom:6px}
    .lock-card p{color:var(--text2);font-size:13.5px;margin-bottom:24px}
    input[type=checkbox]{width:15px;height:15px;cursor:pointer;accent-color:var(--accent)}
    .tag-list{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
    .tag{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;background:var(--surface2);border:1px solid var(--border);border-radius:100px;font-size:12.5px}
    .tag button{background:none;border:none;cursor:pointer;color:var(--text3);padding:0;line-height:1;font-size:14px}
    .tag button:hover{color:var(--danger)}
    .rule-row{display:flex;align-items:center;gap:10px;padding:10px 14px;border:1px solid var(--border);border-radius:var(--radius-sm);margin-bottom:8px;background:var(--surface2);font-size:13px}
    .balance-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
    .balance-card{padding:20px;border-radius:var(--radius);border:1px solid var(--border)}
    .balance-card.p1{background:linear-gradient(135deg,#e8f4f0,#d5ece5);border-color:#bdddd4}
    .balance-card.p2{background:linear-gradient(135deg,#eaf2fb,#d4e9f7);border-color:#b8d8f0}
    .balance-name{font-size:13px;font-weight:600;color:var(--text2);margin-bottom:8px;text-transform:uppercase;letter-spacing:.4px}
    .balance-amount{font-size:32px;font-weight:600;letter-spacing:-1px;font-family:'DM Mono',monospace}
    .balance-card.p1 .balance-amount{color:var(--accent)}
    .balance-card.p2 .balance-amount{color:var(--income)}
    .search-bar{display:flex;gap:10px;align-items:center;margin-bottom:16px;flex-wrap:wrap}
    .search-input-wrap{position:relative;flex:1;min-width:180px;max-width:280px}
    .search-input-wrap svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text3);pointer-events:none}
    .search-input{padding:8px 12px 8px 34px;border:1px solid var(--border);border-radius:var(--radius-sm);font-family:'DM Sans',sans-serif;font-size:13.5px;width:100%;background:var(--surface)}
    .search-input:focus{outline:none;border-color:var(--accent)}
    .pagination{display:flex;gap:6px;align-items:center;justify-content:space-between;margin-top:16px;font-size:13px;color:var(--text2);padding:0 4px}
    .chart-grid{display:grid;grid-template-columns:1.3fr 1fr;gap:16px;margin-bottom:16px}
    .suggestion-row{display:flex;align-items:center;gap:10px;padding:8px 12px;border:1px solid var(--border);border-radius:var(--radius-sm);margin-bottom:6px;background:var(--surface);font-size:13px}
    .conf-badge{font-size:11px;padding:2px 7px;border-radius:100px;background:var(--accent-light);color:var(--accent);font-weight:600}
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useCallback,useRef,useMemo} = React;
const API='';

// ── Icons ─────────────────────────────────────────────────────────────────────
const Icon=({name,size=16,style})=>{
  const p={width:size,height:size,viewBox:"0 0 24 24",fill:"none",stroke:"currentColor",strokeWidth:2,strokeLinecap:"round",strokeLinejoin:"round",style};
  const icons={
    home:<svg {...p}><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>,
    list:<svg {...p}><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>,
    upload:<svg {...p}><polyline points="16 16 12 12 8 16"/><line x1="12" y1="12" x2="12" y2="21"/><path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"/></svg>,
    settings:<svg {...p}><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>,
    plus:<svg {...p} strokeWidth="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>,
    edit:<svg {...p}><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>,
    trash:<svg {...p}><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>,
    x:<svg {...p} strokeWidth="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>,
    warn:<svg {...p}><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>,
    search:<svg {...p}><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>,
    lock:<svg {...p}><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>,
    filter:<svg {...p}><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg>,
    zap:<svg {...p}><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>,
    chevup:<svg {...p} strokeWidth="2.5"><polyline points="18 15 12 9 6 15"/></svg>,
    chevdown:<svg {...p} strokeWidth="2.5"><polyline points="6 9 12 15 18 9"/></svg>,
    chevsort:<svg {...p}><polyline points="6 9 12 3 18 9"/><polyline points="6 15 12 21 18 15"/></svg>,
  };
  return icons[name]||null;
};

// ── Helpers ───────────────────────────────────────────────────────────────────
const fmt=n=>n==null?'—':`${n<0?'-':n>0?'+':''}$${Math.abs(n).toFixed(2)}`;
const fmtAbs=n=>n==null?'—':`$${Math.abs(n).toFixed(2)}`;
const today=()=>new Date().toISOString().slice(0,10);
const getToken=()=>sessionStorage.getItem('bk_token');
const setToken=t=>sessionStorage.setItem('bk_token',t);
const authFetch=(url,opts={})=>{
  const headers={...(opts.headers||{}),'Authorization':`Bearer ${getToken()}`};
  return fetch(url,{...opts,headers});
};

function Toast({msg,onDone}){
  useEffect(()=>{const t=setTimeout(onDone,2800);return()=>clearTimeout(t);},[]);
  return <div className="toast">{msg}</div>;
}

// ── Lock Screen ───────────────────────────────────────────────────────────────
function LockScreen({onUnlock}){
  const [pw,setPw]=useState('');
  const [err,setErr]=useState('');
  const [loading,setLoading]=useState(false);
  const submit=async()=>{
    setLoading(true);setErr('');
    try{
      const r=await fetch(`${API}/api/auth/login`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({password:pw})});
      if(r.ok){const d=await r.json();setToken(d.token);onUnlock();}
      else setErr('Incorrect password.');
    }catch{setErr('Could not connect.');}
    setLoading(false);
  };
  return(
    <div className="lock-screen">
      <div className="lock-card">
        <div style={{marginBottom:16,color:'var(--accent)'}}><Icon name="lock" size={32}/></div>
        <h1>Bank<span>ing</span></h1>
        <p>Enter your password to continue</p>
        <div className="form-group" style={{marginBottom:14}}>
          <input type="password" className="form-input" placeholder="Password" value={pw}
            onChange={e=>setPw(e.target.value)} onKeyDown={e=>e.key==='Enter'&&submit()} autoFocus/>
        </div>
        {err&&<p style={{color:'var(--danger)',fontSize:13,marginBottom:10}}>{err}</p>}
        <button className="btn btn-primary" style={{width:'100%'}} onClick={submit} disabled={loading}>
          {loading?'Checking…':'Unlock'}
        </button>
      </div>
    </div>
  );
}

// ── Split Input (handles both % and $ input) ─────────────────────────────────
function SplitInput({label,pct,onPctChange,amount,readonly}){
  const [mode,setMode]=useState('pct'); // 'pct' or 'dollar'
  const dollarVal=pct!=null?(pct*amount).toFixed(2):'';
  const handleDollar=v=>{
    if(!v){onPctChange('');return;}
    const d=parseFloat(v);
    if(!isNaN(d)&&amount!==0) onPctChange(String(Math.round((d/amount)*100)));
  };
  if(readonly) return(
    <div className="split-row">
      <span className="split-person">{label}</span>
      <input className="split-input readonly" readOnly value={pct!=null?Math.round(pct*100):''}/>
      <span style={{color:'var(--text3)',fontSize:12}}>%</span>
      <span style={{fontFamily:'DM Mono',fontSize:12.5,color:'var(--text2)',width:80,textAlign:'right'}}>{pct!=null?fmtAbs(pct*amount):'—'}</span>
    </div>
  );
  return(

    </div>
  );
}

// ── Transaction Form Modal ────────────────────────────────────────────────────
function TxModal({tx,onClose,onSave,settings,categories}){
  const isEdit=!!tx?.id;
  const [form,setForm]=useState({
    date:tx?.date||today(),value_date:tx?.value_date||'',
    amount:tx?.amount!=null?String(tx.amount):'',
    merchant:tx?.merchant||'',category:tx?.category||(categories[0]||'Groceries'),
    notes:tx?.notes||'',
    p1pct:tx?.person1_pct!=null?String(Math.round(tx.person1_pct*100)):'',
    is_starting_balance:tx?.is_starting_balance||false,
  });
  const [saving,setSaving]=useState(false);
  const [err,setErr]=useState('');
  const set=(k,v)=>setForm(f=>({...f,[k]:v}));
  const amount=parseFloat(form.amount)||0;
  const p1pct=form.p1pct===''?null:parseFloat(form.p1pct)/100;
  const p2pct=p1pct!=null?1-p1pct:null;

  const handleSave=async()=>{
    if(!form.merchant.trim()){setErr('Merchant required.');return;}
    if(!form.amount||isNaN(parseFloat(form.amount))){setErr('Amount required.');return;}
    setSaving(true);
    try{
      await onSave({
        date:form.date,value_date:form.value_date||null,
        amount:parseFloat(form.amount),merchant:form.merchant.trim(),
        category:form.category,notes:form.notes.trim()||null,
        person1_pct:p1pct,is_transfer:form.category==='Transfer',
        is_starting_balance:form.is_starting_balance,
      });
      onClose();
    }catch{setErr('Save failed.');setSaving(false);}
  };

  return(
    <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal">
        <div className="modal-header">
          <h3>{isEdit?'Edit Transaction':'Add Transaction'}</h3>
          <button className="btn btn-ghost btn-sm" onClick={onClose}><Icon name="x"/></button>
        </div>
        <div className="modal-body">
          <div className="form-grid">
            <div className="form-grid form-grid-2">
              <div className="form-group">
                <label className="form-label">Desktop Date</label>
                <input type="date" className="form-input" value={form.date} onChange={e=>set('date',e.target.value)}/>
              </div>
              <div className="form-group">
                <label className="form-label">Mobile Date <span style={{fontWeight:400,color:'var(--text3)'}}>(Value Date)</span></label>
                <input type="date" className="form-input" value={form.value_date} onChange={e=>set('value_date',e.target.value)}/>
                {!form.value_date&&<span className="form-hint">Blank = Pending</span>}
              </div>
            </div>
            <div className="form-group">
              <label className="form-label">Amount ($)</label>
              <input type="number" className="form-input" step="0.01" placeholder="-25.00" value={form.amount} onChange={e=>set('amount',e.target.value)}/>
            </div>
            <div className="form-group">
              <label className="form-label">Merchant / Description</label>
              <input type="text" className="form-input" placeholder="Woolworths" value={form.merchant} onChange={e=>set('merchant',e.target.value)}/>
            </div>
            <div className="form-grid form-grid-2">
              <div className="form-group">
                <label className="form-label">Category</label>
                <select className="form-select" value={form.category} onChange={e=>set('category',e.target.value)}>
                  {categories.map(c=><option key={c}>{c}</option>)}
                </select>
              </div>
              <div className="form-group">
                <label className="form-label">Notes</label>
                <input type="text" className="form-input" value={form.notes} onChange={e=>set('notes',e.target.value)}/>
              </div>
            </div>
            <div className="form-group">
              <label style={{display:'flex',alignItems:'center',gap:8,fontSize:13,cursor:'pointer'}}>
                <input type="checkbox" checked={form.is_starting_balance} onChange={e=>set('is_starting_balance',e.target.checked)}/>

              </label>
            </div>
            {form.category!=='Transfer'&&!form.is_starting_balance&&(
              <div className="form-group">
                <label className="form-label">Split — click % or $ to switch input mode</label>

// ── Column Filter Popup ───────────────────────────────────────────────────────
function ColFilterPopup({col,colType,currentFilter,onApply,onClose}){
  const [text,setText]=useState(currentFilter?.text||'');
  const [dateFrom,setDateFrom]=useState(currentFilter?.dateFrom||'');
  const [dateTo,setDateTo]=useState(currentFilter?.dateTo||'');
  const [checked,setChecked]=useState(new Set(currentFilter?.values||[]));
  const [values,setValues]=useState([]);
  const ref=useRef();

  useEffect(()=>{
    if(colType==='values'||colType==='date-values'){
      authFetch(`${API}/api/transactions/column-values?col=${col}`).then(r=>r.json()).then(setValues);
    }
    const handler=e=>{if(ref.current&&!ref.current.contains(e.target))onClose();};
    document.addEventListener('mousedown',handler);
    return()=>document.removeEventListener('mousedown',handler);
  },[]);

  const toggle=v=>setChecked(s=>{const n=new Set(s);n.has(v)?n.delete(v):n.add(v);return n;});
  const apply=()=>onApply({text,dateFrom,dateTo,values:[...checked]});
  const clear=()=>{setText('');setDateFrom('');setDateTo('');setChecked(new Set());onApply(null);};

  return(
    <div className="col-filter-popup" ref={ref}>
      {(colType==='text'||colType==='values')&&(
        <input type="text" placeholder="Search…" value={text} onChange={e=>setText(e.target.value)}
          onKeyDown={e=>e.key==='Enter'&&apply()} autoFocus/>
      )}
      {(colType==='date'||colType==='date-values')&&(
        <>
          <label style={{fontSize:12,color:'var(--text3)'}}>From</label>
          <input type="date" value={dateFrom} onChange={e=>setDateFrom(e.target.value)}/>
          <label style={{fontSize:12,color:'var(--text3)'}}>To</label>
          <input type="date" value={dateTo} onChange={e=>setDateTo(e.target.value)}/>
        </>
      )}
      {(colType==='values'||colType==='date-values')&&values.length>0&&(
        <div className="filter-values">
          {values.filter(v=>!text||String(v).toLowerCase().includes(text.toLowerCase())).map(v=>(
            <label key={v} className="filter-val-row">
              <input type="checkbox" checked={checked.has(v)} onChange={()=>toggle(v)}/>
              <span>{v}</span>
            </label>
          ))}
        </div>
      )}
      <div style={{display:'flex',gap:6}}>
        <button className="btn btn-primary btn-sm" style={{flex:1}} onClick={apply}>Apply</button>
        <button className="btn btn-secondary btn-sm" onClick={clear}>Clear</button>
      </div>
    </div>
  );
}

// ── Resizable Table Header ────────────────────────────────────────────────────
function ResizableTh({colKey,label,width,onResize,sortCol,sortDir,onSort,colType,colFilter,onFilter,children}){
  const [resizing,setResizing]=useState(false);
  const [showFilter,setShowFilter]=useState(false);
  const startX=useRef(0);
  const startW=useRef(0);

  const onMouseDown=e=>{
    e.preventDefault();
    startX.current=e.clientX;
    startW.current=width;
    setResizing(true);
    const move=ev=>onResize(Math.max(60,startW.current+(ev.clientX-startX.current)));
    const up=()=>{setResizing(false);window.removeEventListener('mousemove',move);window.removeEventListener('mouseup',up);};
    window.addEventListener('mousemove',move);
    window.addEventListener('mouseup',up);
  };

  const isFiltered=colFilter&&(colFilter.text||colFilter.dateFrom||colFilter.dateTo||(colFilter.values&&colFilter.values.length>0));
  const isSorted=sortCol===colKey;

  return(
    <th style={{width,minWidth:width}} className={onSort?'th-sort':''}>
      <div className="th-inner" onClick={onSort?()=>onSort(colKey):undefined}>
        {children||label}
        {onSort&&(isSorted?(sortDir==='asc'?<Icon name="chevup" size={12}/>:<Icon name="chevdown" size={12}/>):<Icon name="chevsort" size={12} style={{opacity:.3}}/>)}
        {colType&&(
          <button className={`th-filter-btn ${isFiltered?'active':''}`} onClick={e=>{e.stopPropagation();setShowFilter(s=>!s);}}>
            <Icon name="filter" size={11}/>
          </button>
        )}
      </div>
      {showFilter&&<ColFilterPopup col={colKey} colType={colType} currentFilter={colFilter} onApply={f=>{onFilter(colKey,f);setShowFilter(false);}} onClose={()=>setShowFilter(false)}/>}
      <div className={`th-resize ${resizing?'dragging':''}`} onMouseDown={onMouseDown}/>
    </th>
  );
}

            <Recharts.PieChart>
              <Recharts.Pie data={catData} dataKey="value" nameKey="name" cx="45%" cy="50%" outerRadius={75} paddingAngle={2}>
                {catData.map((_,i)=><Recharts.Cell key={i} fill={PIE_COLORS[i%PIE_COLORS.length]}/>)}
              </Recharts.Pie>
              <Recharts.Tooltip content={<PieTooltip/>}/>
              <Recharts.Legend iconType="circle" iconSize={8} wrapperStyle={{fontSize:11}} layout="vertical" align="right" verticalAlign="middle"/>
            </Recharts.PieChart>
          </Recharts.ResponsiveContainer>

      {personData.length>0&&(
        <div className="card card-padded" style={{marginBottom:16}}>
          <div className="section-title" style={{marginTop:0}}>Monthly Income per Person</div>
          <Recharts.ResponsiveContainer width="100%" height={200}>
            <Recharts.BarChart data={personData} barGap={4}>
              <Recharts.CartesianGrid strokeDasharray="3 3" stroke="var(--border)"/>
              <Recharts.XAxis dataKey="month" tick={{fontSize:12,fill:'var(--text3)'}} axisLine={false} tickLine={false}/>
              <Recharts.YAxis tick={{fontSize:11,fill:'var(--text3)'}} axisLine={false} tickLine={false} tickFormatter={v=>`$${v}`}/>
              <Recharts.Tooltip content={<CustomTooltip/>}/>
              <Recharts.Legend wrapperStyle={{fontSize:12}}/>
              <Recharts.Bar dataKey={settings.person1_name} fill={PIE_COLORS[1]} radius={[4,4,0,0]}/>
              <Recharts.Bar dataKey={settings.person2_name} fill={PIE_COLORS[0]} radius={[4,4,0,0]}/>
            </Recharts.BarChart>
          </Recharts.ResponsiveContainer>
        </div>
      )}
      <div className="balance-grid">
        <div className="balance-card p1"><div className="balance-name">{settings.person1_name}</div><div className="balance-amount">{fmt(summary.person1_balance)}</div><div className="stat-sub" style={{marginTop:6}}>Total share (filtered)</div></div>
        <div className="balance-card p2"><div className="balance-name">{settings.person2_name}</div><div className="balance-amount">{fmt(summary.person2_balance)}</div><div className="stat-sub" style={{marginTop:6}}>Total share (filtered)</div></div>

// ── Transactions ──────────────────────────────────────────────────────────────
const DEFAULT_WIDTHS={check:36,date:110,value_date:110,merchant:200,category:120,notes:160,amount:100,p1:100,p2:100,split:70,actions:80};

function Transactions({settings,categories,onCategoriesChange}){
  const [data,setData]=useState({transactions:[],total:0,all_ids:[]});
  const [search,setSearch]=useState('');
  const [modal,setModal]=useState(null);
  const [toast,setToast]=useState('');
  const [page,setPage]=useState(0);
  const [pageSize,setPageSize]=useState(50);
  const [selected,setSelected]=useState(new Set());
  const [selectAllPages,setSelectAllPages]=useState(false);
  const [sortCol,setSortCol]=useState('date');
  const [sortDir,setSortDir]=useState('desc');
  const [colWidths,setColWidths]=useState(DEFAULT_WIDTHS);
  const [colFilters,setColFilters]=useState({});

  const buildUrl=useCallback((overrides={})=>{
    const o={page,pageSize,search,sortCol,sortDir,colFilters,...overrides};
    let url=`${API}/api/transactions?limit=${o.pageSize}&offset=${o.page*o.pageSize}&sort_col=${o.sortCol}&sort_dir=${o.sortDir}`;
    if(o.search) url+=`&search=${encodeURIComponent(o.search)}`;
    const f=o.colFilters;
    if(f.date?.dateFrom) url+=`&date_from=${f.date.dateFrom}`;
    if(f.date?.dateTo) url+=`&date_to=${f.date.dateTo}`;
    if(f.merchant?.text) url+=`&search=${encodeURIComponent(f.merchant.text)}`;
    if(f.category?.values?.length) url+=`&categories=${f.category.values.join('|')}`;
    if(f.merchant?.values?.length) url+=`&merchants=${f.merchant.values.join('|')}`;
    return url;
  },[page,pageSize,search,sortCol,sortDir,colFilters]);

  const load=useCallback(()=>{
    authFetch(buildUrl()).then(r=>r.json()).then(d=>{setData(d);setSelected(new Set());setSelectAllPages(false);});
  },[buildUrl]);

  useEffect(()=>{load();},[load]);

  const handleSort=col=>{
    if(sortCol===col) setSortDir(d=>d==='asc'?'desc':'asc');
    else{setSortCol(col);setSortDir('asc');}
    setPage(0);
  };

  const handleFilter=(col,filter)=>{
    setColFilters(f=>({...f,[col]:filter}));
    setPage(0);
  };

  const txs=data.transactions||[];
  const total=data.total||0;
  const totalPages=Math.ceil(total/pageSize)||1;

  const handleSave=async(formData)=>{
    if(modal.tx?.id){
      await authFetch(`${API}/api/transactions/${modal.tx.id}`,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(formData)});
      setToast('Updated');
    }else{
      await authFetch(`${API}/api/transactions`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(formData)});
      setToast('Added');
    }
    load();
  };

  const handleDelete=async()=>{
    await authFetch(`${API}/api/transactions/${modal.tx.id}`,{method:'DELETE'});
    setToast('Deleted');setModal(null);load();
  };

  const handleBulkDelete=async()=>{
    const ids=selectAllPages?data.all_ids:[...selected];
    await authFetch(`${API}/api/transactions/bulk`,{method:'DELETE',headers:{'Content-Type':'application/json'},body:JSON.stringify({ids})});
    setToast(`Deleted ${ids.length} transactions`);setModal(null);setSelected(new Set());setSelectAllPages(false);load();
  };

  const handleBulkEdit=async(body)=>{
    const ids=selectAllPages?data.all_ids:[...selected];
    await authFetch(`${API}/api/transactions/bulk-edit`,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({ids,...body})});
    setToast(`Updated ${ids.length} transactions`);setModal(null);setSelected(new Set());setSelectAllPages(false);load();
  };

  const handleSelectAll=async()=>{
    // Fetch ALL matching IDs
    const url=buildUrl()+'&select_all=true';
    const d=await authFetch(url).then(r=>r.json());
    setSelected(new Set(d.all_ids));
    setSelectAllPages(true);
  };

  const toggleSelect=id=>setSelected(s=>{const n=new Set(s);n.has(id)?n.delete(id):n.add(id);return n;});
  const togglePage=()=>setSelected(s=>s.size===txs.length?new Set():new Set(txs.map(t=>t.id)));
  const resize=(col,w)=>setColWidths(c=>({...c,[col]:w}));
  const selCount=selectAllPages?data.all_ids.length:selected.size;
  const hasActiveFilter=Object.values(colFilters).some(f=>f&&(f.text||f.dateFrom||f.dateTo||(f.values&&f.values.length)));

  return(
    <div>
      <div className="page-header">
        <div><h2>Transactions</h2><p>{total.toLocaleString()} total</p></div>
        <div style={{display:'flex',gap:8}}>
          {hasActiveFilter&&<button className="btn btn-secondary btn-sm" onClick={()=>{setColFilters({});setPage(0);}}>Clear filters</button>}
          <button className="btn btn-primary" onClick={()=>setModal({type:'add'})}><Icon name="plus" size={14}/>Add</button>
        </div>
      </div>

      <div className="search-bar">
        <div className="search-input-wrap">
          <Icon name="search" size={14}/>
          <input className="search-input" placeholder="Search…" value={search} onChange={e=>{setSearch(e.target.value);setPage(0);}}/>
        </div>
        <div style={{marginLeft:'auto',display:'flex',alignItems:'center',gap:8}}>
          <span style={{fontSize:13,color:'var(--text3)'}}>Per page:</span>
          <select className="filter-select" value={pageSize} onChange={e=>{setPageSize(Number(e.target.value));setPage(0);}}>
            {[25,50,100,200].map(n=><option key={n} value={n}>{n}</option>)}
          </select>
        </div>
      </div>

      {(selected.size>0||selectAllPages)&&(
        <div className="bulk-bar">
          <Icon name="warn" size={15}/>
          <span>{selCount} selected</span>
          {!selectAllPages&&total>txs.length&&<button className="btn btn-secondary btn-sm" onClick={handleSelectAll}>Select all {total}</button>}
          {selectAllPages&&<span style={{fontSize:12}}>(all {total} across all pages)</span>}
          <button className="btn btn-secondary btn-sm" onClick={()=>setModal({type:'bulkedit'})}><Icon name="edit" size={13}/>Edit</button>
          <button className="btn btn-danger btn-sm" onClick={()=>setModal({type:'bulkdelete'})}><Icon name="trash" size={13}/>Delete</button>
          <button className="btn btn-ghost btn-sm" onClick={()=>{setSelected(new Set());setSelectAllPages(false);}}>Deselect</button>
        </div>
      )}

      <div className="card">
        <div className="table-outer">
          <table style={{minWidth:900}}>
            <thead>
              <tr>
                <th style={{width:colWidths.check}}><div className="th-inner"><input type="checkbox" checked={txs.length>0&&selected.size===txs.length} onChange={togglePage}/></div></th>
                {[
                  {key:'date',label:'Desktop Date',sortable:true,colType:'date'},
                  {key:'value_date',label:'Mobile Date',sortable:true,colType:'date'},
                  {key:'merchant',label:'Merchant',sortable:true,colType:'values'},
                  {key:'category',label:'Category',sortable:true,colType:'values'},
                  {key:'notes',label:'Notes',sortable:false,colType:'text'},
                  {key:'amount',label:'Amount',sortable:true,colType:null},
                  {key:'p1',label:settings.person1_name,sortable:false,colType:null},
                  {key:'p2',label:settings.person2_name,sortable:false,colType:null},
                  {key:'split',label:'Split',sortable:false,colType:null},
                ].map(c=>(
                  <ResizableTh key={c.key} colKey={c.key} label={c.label} width={colWidths[c.key]||120}
                    onResize={w=>resize(c.key,w)}
                    sortCol={sortCol} sortDir={sortDir} onSort={c.sortable?handleSort:null}
                    colType={c.colType} colFilter={colFilters[c.key]} onFilter={handleFilter}/>
                ))}
                <th style={{width:colWidths.actions}}><div className="th-inner">Actions</div></th>
              </tr>
            </thead>
            <tbody>
              {txs.length===0&&<tr><td colSpan={11}><div className="empty-state"><Icon name="list" size={32}/><p>No transactions found</p></div></td></tr>}
              {txs.map(tx=>(
                <tr key={tx.id} className={selected.has(tx.id)?'selected-row':''}>
                  <td style={{width:colWidths.check}}><input type="checkbox" checked={selected.has(tx.id)} onChange={()=>toggleSelect(tx.id)}/></td>
                  <td style={{width:colWidths.date,fontFamily:'DM Mono',fontSize:12.5,color:'var(--text2)'}}>{tx.date}</td>
                  <td style={{width:colWidths.value_date,fontFamily:'DM Mono',fontSize:12.5}}>
                    {tx.value_date?<span style={{color:'var(--text2)'}}>{tx.value_date}</span>:<span className="badge badge-pending">Pending</span>}
                  </td>
                  <td style={{width:colWidths.merchant,fontWeight:500}}>{tx.merchant}</td>
                  <td style={{width:colWidths.category}}>
                    <span className={`badge ${tx.is_transfer?'badge-transfer':tx.is_starting_balance?'badge-start':'badge-cat'}`}>{tx.category}</span>
                  </td>
                  <td style={{width:colWidths.notes,color:'var(--text3)',fontSize:13}}>{tx.notes||'—'}</td>
                  <td style={{width:colWidths.amount,textAlign:'right'}} className={`amount-cell ${tx.amount<0?'amount-neg':'amount-pos'}`}>{fmt(tx.amount)}</td>
                  <td style={{width:colWidths.p1,textAlign:'right'}} className="amount-cell">{tx.is_pending?<span className="badge badge-pending">Pending</span>:tx.is_transfer||tx.is_starting_balance?'—':fmtAbs(tx.person1_amount)}</td>
                  <td style={{width:colWidths.p2,textAlign:'right'}} className="amount-cell">{tx.is_pending?'—':tx.is_transfer||tx.is_starting_balance?'—':fmtAbs(tx.person2_amount)}</td>
                  <td style={{width:colWidths.split,textAlign:'right',fontFamily:'DM Mono',fontSize:12,color:'var(--text3)'}}>
                    {tx.is_transfer||tx.is_starting_balance?'—':tx.is_pending?'—':`${Math.round(tx.person1_pct*100)}/${Math.round(tx.person2_pct*100)}`}
                  </td>
                  <td style={{width:colWidths.actions}}>
                    <div style={{display:'flex',gap:4,justifyContent:'flex-end'}}>
                      <button className="btn btn-ghost btn-sm" onClick={()=>setModal({type:'edit',tx})}><Icon name="edit" size={13}/></button>
                      <button className="btn btn-ghost btn-sm" style={{color:'var(--danger)'}} onClick={()=>setModal({type:'delete',tx})}><Icon name="trash" size={13}/></button>
                    </div>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
        <div className="pagination" style={{padding:'12px 16px'}}>
          <span style={{color:'var(--text3)'}}>Showing {page*pageSize+1}–{Math.min((page+1)*pageSize,total)} of {total}</span>
          <div style={{display:'flex',gap:6}}>
            <button className="btn btn-secondary btn-sm" onClick={()=>setPage(0)} disabled={page===0}>«</button>
            <button className="btn btn-secondary btn-sm" onClick={()=>setPage(p=>p-1)} disabled={page===0}>← Prev</button>
            <span style={{padding:'5px 8px'}}>Page {page+1} of {totalPages}</span>
            <button className="btn btn-secondary btn-sm" onClick={()=>setPage(p=>p+1)} disabled={page+1>=totalPages}>Next →</button>
            <button className="btn btn-secondary btn-sm" onClick={()=>setPage(totalPages-1)} disabled={page+1>=totalPages}>»</button>
          </div>
        </div>
      </div>

      {(modal?.type==='add'||modal?.type==='edit')&&<TxModal tx={modal.tx} onClose={()=>setModal(null)} onSave={handleSave} settings={settings} categories={categories}/>}
      {modal?.type==='delete'&&(
        <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&setModal(null)}>
          <div className="modal" style={{maxWidth:420}}>
            <div className="modal-header"><h3>Delete Transaction</h3><button className="btn btn-ghost btn-sm" onClick={()=>setModal(null)}><Icon name="x"/></button></div>
            <div className="modal-body">
              <p style={{fontSize:14,color:'var(--text2)',marginBottom:8}}>Permanently delete <strong>{modal.tx.merchant}</strong> ({fmtAbs(modal.tx.amount)} on {modal.tx.date})?</p>
              <p style={{fontSize:13,color:'var(--danger)',fontWeight:500}}>This action cannot be undone.</p>
            </div>
            <div className="modal-footer"><button className="btn btn-secondary" onClick={()=>setModal(null)}>Cancel</button><button className="btn btn-danger" onClick={handleDelete}>Delete permanently</button></div>
          </div>
        </div>
      )}
      {modal?.type==='bulkdelete'&&(
        <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&setModal(null)}>
          <div className="modal" style={{maxWidth:420}}>
            <div className="modal-header"><h3>Delete {selCount} Transactions</h3><button className="btn btn-ghost btn-sm" onClick={()=>setModal(null)}><Icon name="x"/></button></div>
            <div className="modal-body">
              <p style={{fontSize:14,color:'var(--text2)',marginBottom:8}}>Permanently delete <strong>{selCount} selected transactions</strong>?</p>
              <p style={{fontSize:13,color:'var(--danger)',fontWeight:500}}>This action cannot be undone.</p>
            </div>
            <div className="modal-footer"><button className="btn btn-secondary" onClick={()=>setModal(null)}>Cancel</button><button className="btn btn-danger" onClick={handleBulkDelete}>Delete {selCount} permanently</button></div>
          </div>
        </div>
      )}
      {modal?.type==='bulkedit'&&<BulkEditModal count={selCount} categories={categories} settings={settings} onClose={()=>setModal(null)} onSave={handleBulkEdit}/>}
      {toast&&<Toast msg={toast} onDone={()=>setToast('')}/>}
    </div>
  );
}

// ── Import ────────────────────────────────────────────────────────────────────
function ImportSection({title,accept,endpoint,instructions,hint,afterNote}){
  const [file,setFile]=useState(null);
  const [result,setResult]=useState(null);
  const [loading,setLoading]=useState(false);
  const [err,setErr]=useState('');
  const doImport=async()=>{
    if(!file) return;
    setLoading(true);setErr('');setResult(null);
    const fd=new FormData();fd.append('file',file);
    try{
      const r=await authFetch(`${API}${endpoint}`,{method:'POST',body:fd});
      const d=await r.json();
      d.detail?setErr(d.detail):setResult(d);
    }catch{setErr('Import failed.');}
    setLoading(false);
  };
  return(
    <div className="card card-padded" style={{maxWidth:560,marginBottom:20}}>
      <div className="section-title" style={{marginTop:0}}>{title}</div>
      <ol style={{color:'var(--text2)',fontSize:13.5,lineHeight:2,paddingLeft:18,marginBottom:20}}>
        {instructions.map((s,i)=><li key={i} dangerouslySetInnerHTML={{__html:s}}/>)}
      </ol>
      <label className="upload-area" onDragOver={e=>e.preventDefault()} onDrop={e=>{e.preventDefault();setFile(e.dataTransfer.files[0]);setResult(null);setErr('');}}>
        <input type="file" accept={accept} style={{display:'none'}} onChange={e=>{setFile(e.target.files[0]);setResult(null);setErr('');}}/>
        <Icon name="upload" size={28}/>
        <p>{file?file.name:'Click or drag & drop'}</p>
        <small>{hint}</small>
      </label>
      {file&&!result&&<button className="btn btn-primary" style={{marginTop:14}} onClick={doImport} disabled={loading}>{loading?'Importing…':'Import'}</button>}
      {result&&(
        <div style={{marginTop:14,padding:14,background:'var(--accent-light)',borderRadius:'var(--radius)',border:'1px solid #bdddd4'}}>
          <p style={{fontWeight:600,color:'var(--accent)',marginBottom:4}}>✓ Import complete</p>
          <p style={{fontSize:13,color:'var(--text2)'}}>{result.imported} imported{result.skipped>0?`, ${result.skipped} skipped`:''}{result.duplicates>0?`, ${result.duplicates} duplicates skipped`:''}.</p>
          {result.duplicate_rows?.length>0&&<p style={{fontSize:12,color:'var(--text3)',marginTop:4}}>First duplicate: {result.duplicate_rows[0].merchant} on {result.duplicate_rows[0].date}</p>}
        </div>
      )}
      {err&&<p style={{color:'var(--danger)',fontSize:13,marginTop:12}}>{err}</p>}
      {afterNote&&<div style={{marginTop:14,padding:14,background:'var(--warn-light)',borderRadius:'var(--radius)',border:'1px solid #fce4b2'}}><p style={{fontSize:13,color:'var(--text2)'}} dangerouslySetInnerHTML={{__html:afterNote}}/></div>}
    </div>
  );
}
function Import(){
  return(
    <div>
      <div className="page-header"><div><h2>Import</h2><p>Bring in your existing data</p></div></div>
      <ImportSection title="Import from Existing Spreadsheet (.xlsx)" accept=".xlsx" endpoint="/api/import/xlsx"
        instructions={['Use your existing <strong>transactions.xlsx</strong>','Reads: Date, Amount, % splits, Merchant, Notes, Category','Splits preserved — blanks marked <strong>Pending</strong>','Unknown categories created automatically','Duplicates skipped based on your duplicate settings']}
        hint="Your transactions.xlsx" afterNote="Do this <strong>once</strong> to migrate history. Use CommBank CSV for new transactions."/>
      <ImportSection title="Import from CommBank CSV" accept=".csv" endpoint="/api/import/commbank"
        instructions={['Log in to <strong>NetBank</strong>','Go to shared account → <strong>Transaction History</strong>','Select date range → <strong>Export → CSV</strong>','Upload below']}
        hint="CommBank CSV export (.csv)"
        afterNote="<strong>Desktop Date</strong> = NetBank date. <strong>Mobile Date</strong> extracted from description where available. Duplicates skipped per your duplicate settings in Settings."/>
    </div>
  );
}

// ── Settings ──────────────────────────────────────────────────────────────────
function Settings({settings,onSave,categories,onCategoriesChange}){
  const [names,setNames]=useState({person1_name:settings.person1_name,person2_name:settings.person2_name});
  const [namesSaved,setNamesSaved]=useState(false);
  const [newCat,setNewCat]=useState('');
  const [catErr,setCatErr]=useState('');
  const [editingCat,setEditingCat]=useState(null);
  const [editVal,setEditVal]=useState('');
  const [rules,setRules]=useState([]);
  const [newRule,setNewRule]=useState({pattern:'',category:categories[0]||'',use_regex:false});
  const [ruleErr,setRuleErr]=useState('');
  const [suggestions,setSuggestions]=useState([]);
  const [showSuggestions,setShowSuggestions]=useState(false);
  const [previewChanges,setPreviewChanges]=useState(null);
  const [startingBalance,setStartingBalance]=useState('');
  const [dupConfig,setDupConfig]=useState({dup_match_date:true,dup_match_amount:true,dup_match_merchant:true});
  const [toast,setToast]=useState('');

  useEffect(()=>{
    loadRules();
    authFetch(`${API}/api/settings`).then(r=>r.json()).then(d=>{
      setStartingBalance(d.starting_balance||'0');
      setDupConfig({
        dup_match_date:d.dup_match_date!=='0',
        dup_match_amount:d.dup_match_amount!=='0',
        dup_match_merchant:d.dup_match_merchant!=='0',
      });
    });
  },[]);

  const loadRules=()=>authFetch(`${API}/api/rules`).then(r=>r.json()).then(setRules);
  const loadSuggestions=()=>authFetch(`${API}/api/rules/suggestions`).then(r=>r.json()).then(d=>{setSuggestions(d);setShowSuggestions(true);});
  const saveNames=async()=>{
    await authFetch(`${API}/api/settings`,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(names)});
    onSave(names);setNamesSaved(true);setTimeout(()=>setNamesSaved(false),2000);
  };
  const saveBalance=async()=>{
    await authFetch(`${API}/api/settings/starting-balance`,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({value:parseFloat(startingBalance)||0})});
    setToast('Starting balance saved');
  };
  const saveDupConfig=async()=>{
    await authFetch(`${API}/api/settings/dup-config`,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(dupConfig)});
    setToast('Duplicate settings saved');
  };
  const addCat=async()=>{
    if(!newCat.trim()){setCatErr('Name required.');return;}
    const r=await authFetch(`${API}/api/categories`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:newCat.trim()})});
    if(r.ok){setNewCat('');setCatErr('');onCategoriesChange();setToast('Category added');}
    else{const d=await r.json();setCatErr(d.detail||'Error');}
  };
  const deleteCat=async name=>{
    await authFetch(`${API}/api/categories/${encodeURIComponent(name)}`,{method:'DELETE'});
    onCategoriesChange();setToast(`"${name}" deleted`);
  };
  const renameCat=async()=>{
    if(!editVal.trim()) return;
    await authFetch(`${API}/api/categories/${encodeURIComponent(editingCat)}`,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:editVal.trim()})});
    setEditingCat(null);onCategoriesChange();setToast('Category renamed');
  };
  const addRule=async()=>{
    if(!newRule.pattern.trim()){setRuleErr('Pattern required.');return;}
    const r=await authFetch(`${API}/api/rules`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(newRule)});
    if(r.ok){setNewRule({pattern:'',category:categories[0]||'',use_regex:false});setRuleErr('');loadRules();setToast('Rule added');}
    else{const d=await r.json();setRuleErr(d.detail||'Error');}
  };
  const addSuggestion=async s=>{
    await authFetch(`${API}/api/rules`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({pattern:s.pattern,category:s.category,use_regex:false})});
    loadRules();setSuggestions(prev=>prev.filter(x=>x.pattern!==s.pattern));setToast('Rule added from suggestion');
  };
  const deleteRule=async id=>{
    await authFetch(`${API}/api/rules/${id}`,{method:'DELETE'});
    loadRules();setToast('Rule deleted');
  };
  const toggleRule=async(id,enabled)=>{
    await authFetch(`${API}/api/rules/${id}`,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({enabled:enabled?1:0})});
    loadRules();
  };
  const previewApply=async()=>{
    const changes=await authFetch(`${API}/api/rules/preview`,{method:'POST'}).then(r=>r.json());
    if(changes.length===0){setToast('No transactions would change.');return;}
    setPreviewChanges(changes);
  };
  const applySelected=async ids=>{
    const r=await authFetch(`${API}/api/rules/apply`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({ids})});
    const d=await r.json();
    setPreviewChanges(null);setToast(`Updated ${d.updated} transactions`);
  };

  return(
    <div>
      <div className="page-header"><div><h2>Settings</h2><p>Configure your account</p></div></div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16,alignItems:'start'}}>

        <div className="card card-padded">
          <div className="section-title" style={{marginTop:0}}>People</div>
          <div className="form-grid" style={{marginBottom:14}}>
            <div className="form-group"><label className="form-label">Person 1</label><input className="form-input" value={names.person1_name} onChange={e=>setNames(n=>({...n,person1_name:e.target.value}))}/></div>
            <div className="form-group"><label className="form-label">Person 2</label><input className="form-input" value={names.person2_name} onChange={e=>setNames(n=>({...n,person2_name:e.target.value}))}/></div>
          </div>
          <button className="btn btn-primary btn-sm" onClick={saveNames}>{namesSaved?'✓ Saved':'Save Names'}</button>
        </div>

        <div className="card card-padded">
          <div className="section-title" style={{marginTop:0}}>Starting Balance</div>
          <p style={{fontSize:13,color:'var(--text2)',marginBottom:12}}>Enter the shared account balance at the point your records begin. This will be added to the shared balance on the dashboard.</p>
          <div style={{display:'flex',gap:8,alignItems:'center'}}>
            <span style={{fontWeight:500}}>$</span>
            <input className="form-input" type="number" step="0.01" value={startingBalance} onChange={e=>setStartingBalance(e.target.value)} style={{flex:1}}/>
            <button className="btn btn-primary btn-sm" onClick={saveBalance}>Save</button>
          </div>
        </div>

        <div className="card card-padded">
          <div className="section-title" style={{marginTop:0}}>Categories</div>
          <div className="tag-list" style={{marginBottom:14}}>
            {categories.map(c=>(
              <div key={c} className="tag">
                {editingCat===c?(
                  <><input style={{border:'none',background:'transparent',fontFamily:'DM Sans',fontSize:12.5,width:90,outline:'none'}} value={editVal} onChange={e=>setEditVal(e.target.value)} onKeyDown={e=>{if(e.key==='Enter')renameCat();if(e.key==='Escape')setEditingCat(null);}} autoFocus/>
                  <button onClick={renameCat} style={{color:'var(--accent)'}}>✓</button>
                  <button onClick={()=>setEditingCat(null)}>✕</button></>
                ):(
                  <><span onClick={()=>{setEditingCat(c);setEditVal(c);}} style={{cursor:'pointer'}}>{c}</span>
                  <button onClick={()=>deleteCat(c)} title="Delete">×</button></>
                )}
              </div>
            ))}
          </div>
          <div style={{display:'flex',gap:8}}>
            <input className="form-input" placeholder="New category" value={newCat} onChange={e=>setNewCat(e.target.value)} onKeyDown={e=>e.key==='Enter'&&addCat()} style={{flex:1}}/>
            <button className="btn btn-primary btn-sm" onClick={addCat}><Icon name="plus" size={13}/>Add</button>
          </div>
          {catErr&&<p style={{color:'var(--danger)',fontSize:12.5,marginTop:6}}>{catErr}</p>}
        </div>

        <div className="card card-padded">
          <div className="section-title" style={{marginTop:0}}>Duplicate Detection</div>
          <p style={{fontSize:13,color:'var(--text2)',marginBottom:12}}>A transaction is considered a duplicate if it matches on all checked fields.</p>
          {[['dup_match_date','Same date'],['dup_match_amount','Same amount'],['dup_match_merchant','Same merchant']].map(([key,label])=>(
            <label key={key} style={{display:'flex',alignItems:'center',gap:8,fontSize:13.5,cursor:'pointer',marginBottom:8}}>
              <input type="checkbox" checked={dupConfig[key]} onChange={e=>setDupConfig(d=>({...d,[key]:e.target.checked}))}/>
              {label}
            </label>
          ))}
          <button className="btn btn-primary btn-sm" style={{marginTop:8}} onClick={saveDupConfig}>Save</button>
        </div>

        <div className="card card-padded" style={{gridColumn:'1/-1'}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}>
            <div className="section-title" style={{marginTop:0,marginBottom:0}}>Categorisation Rules</div>
            <div style={{display:'flex',gap:8}}>
              <button className="btn btn-secondary btn-sm" onClick={loadSuggestions}><Icon name="zap" size={13}/>Suggest rules</button>
              <button className="btn btn-secondary btn-sm" onClick={previewApply}><Icon name="filter" size={13}/>Preview & apply to all</button>
            </div>
          </div>

          {showSuggestions&&suggestions.length>0&&(
            <div style={{marginBottom:16,padding:14,background:'var(--accent-light)',borderRadius:'var(--radius)',border:'1px solid #bdddd4'}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
                <p style={{fontSize:13,fontWeight:600,color:'var(--accent)'}}>Suggested rules based on your transactions</p>
                <button className="btn btn-ghost btn-sm" onClick={()=>setShowSuggestions(false)}><Icon name="x" size={13}/></button>
              </div>
              {suggestions.map(s=>(
                <div key={s.pattern} className="suggestion-row">
                  <span style={{fontFamily:'DM Mono',fontSize:12.5,flex:1}}>{s.pattern}</span>
                  <span style={{color:'var(--text3)'}}>→</span>
                  <span style={{fontWeight:500,color:'var(--accent)',flex:1}}>{s.category}</span>
                  <span className="conf-badge">{Math.round(s.confidence*100)}% conf.</span>
                  <span style={{fontSize:12,color:'var(--text3)'}}>{s.count} txns</span>
                  <button className="btn btn-primary btn-sm" onClick={()=>addSuggestion(s)}>Add rule</button>
                </div>
              ))}
            </div>
          )}
          {showSuggestions&&suggestions.length===0&&<p style={{fontSize:13,color:'var(--text3)',marginBottom:14}}>No suggestions found — you may already have good coverage.</p>}

          {rules.length===0&&<p style={{color:'var(--text3)',fontSize:13,marginBottom:14}}>No rules yet.</p>}
          {rules.map(r=>(
            <div key={r.id} className="rule-row" style={{opacity:r.enabled?1:.5}}>
              <span style={{fontSize:12,color:'var(--text3)',minWidth:60}}>If merchant</span>
              <span style={{fontFamily:'DM Mono',fontSize:12.5,background:'var(--surface)',border:'1px solid var(--border)',padding:'2px 8px',borderRadius:4,flex:1}}>{r.pattern}</span>
              <span style={{color:'var(--text3)'}}>→</span>
              <span style={{fontWeight:500,color:'var(--accent)'}}>{r.category}</span>
              <span style={{fontSize:11,padding:'2px 7px',borderRadius:100,background:'var(--border)',color:'var(--text2)'}}>{r.use_regex?'regex':'contains'}</span>
              <label style={{display:'flex',alignItems:'center',gap:4,fontSize:12,cursor:'pointer',color:'var(--text2)'}}>
                <input type="checkbox" checked={!!r.enabled} onChange={e=>toggleRule(r.id,e.target.checked)}/>
                On
              </label>
              <button className="btn btn-ghost btn-sm" style={{color:'var(--danger)',marginLeft:'auto'}} onClick={()=>deleteRule(r.id)}><Icon name="trash" size={13}/></button>
            </div>
          ))}

          <div style={{display:'grid',gridTemplateColumns:'1fr auto 1fr auto auto',gap:8,alignItems:'end',marginTop:14,padding:14,background:'var(--surface2)',borderRadius:'var(--radius-sm)'}}>
            <div className="form-group"><label className="form-label">Pattern</label><input className="form-input" placeholder="e.g. woolworths" value={newRule.pattern} onChange={e=>setNewRule(r=>({...r,pattern:e.target.value}))}/></div>
            <span style={{paddingBottom:10,color:'var(--text3)',fontWeight:600}}>→</span>
            <div className="form-group"><label className="form-label">Category</label><select className="form-select" value={newRule.category} onChange={e=>setNewRule(r=>({...r,category:e.target.value}))}>{categories.map(c=><option key={c}>{c}</option>)}</select></div>
            <div className="form-group" style={{justifyContent:'flex-end',paddingBottom:10}}><label style={{display:'flex',alignItems:'center',gap:6,fontSize:13,cursor:'pointer'}}><input type="checkbox" checked={newRule.use_regex} onChange={e=>setNewRule(r=>({...r,use_regex:e.target.checked}))}/>Regex</label></div>
            <div style={{paddingBottom:10}}><button className="btn btn-primary btn-sm" onClick={addRule}><Icon name="plus" size={13}/>Add</button></div>
          </div>
          {ruleErr&&<p style={{color:'var(--danger)',fontSize:12.5,marginTop:6}}>{ruleErr}</p>}
          <p className="form-hint" style={{marginTop:8}}>Rules apply top to bottom. "Contains" is case-insensitive. Toggle "On" to disable without deleting.</p>
        </div>
      </div>

      {previewChanges&&<RulePreviewModal changes={previewChanges} onClose={()=>setPreviewChanges(null)} onApply={applySelected}/>}
      {toast&&<Toast msg={toast} onDone={()=>setToast('')}/>}
    </div>
  );
}

// ── Error Boundary ────────────────────────────────────────────────────────────
class ErrorBoundary extends React.Component{
  constructor(p){super(p);this.state={error:null};}
  static getDerivedStateFromError(e){return{error:e};}
  render(){
    if(this.state.error)return(
      <div style={{fontFamily:'sans-serif',padding:40,color:'#c0392b'}}>
        <h2>Something went wrong</h2>
        <pre style={{marginTop:12,fontSize:13,color:'#333',whiteSpace:'pre-wrap'}}>{this.state.error.message}</pre>
        <p style={{marginTop:12,color:'#666'}}>Open DevTools (F12) for details.</p>
      </div>
    );
    return this.props.children;
  }
}

// ── App ───────────────────────────────────────────────────────────────────────
function App(){
  const [authed,setAuthed]=useState(false);
  const [pwRequired,setPwRequired]=useState(false);
  const [checking,setChecking]=useState(true);
  const [page,setPage]=useState('dashboard');
  const [settings,setSettings]=useState({person1_name:'Person 1',person2_name:'Person 2'});
  const [categories,setCategories]=useState([]);

  useEffect(()=>{
    fetch(`${API}/api/auth/check`,{headers:{'Authorization':`Bearer ${getToken()}`}})
      .then(r=>r.json()).then(d=>{setPwRequired(d.password_required);if(d.ok)setAuthed(true);setChecking(false);})
      .catch(()=>setChecking(false));
  },[]);

  useEffect(()=>{
    if(!authed)return;
    authFetch(`${API}/api/settings`).then(r=>r.json()).then(setSettings);
    loadCats();
  },[authed]);

  const loadCats=()=>authFetch(`${API}/api/categories`).then(r=>r.json()).then(setCategories);

  if(checking)return null;
  if(!authed&&pwRequired)return <LockScreen onUnlock={()=>setAuthed(true)}/>;
  if(!authed){
    // No password set — auto-login
    fetch(`${API}/api/auth/login`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({password:''})})
      .then(r=>r.json()).then(d=>{setToken(d.token);setAuthed(true);});
    return null;
  }

  const nav=[
    {id:'dashboard',label:'Dashboard',icon:'home'},
    {id:'transactions',label:'Transactions',icon:'list'},
    {id:'import',label:'Import',icon:'upload'},
    {id:'settings',label:'Settings',icon:'settings'},
  ];

  return(
    <div className="app">
      <aside className="sidebar">
        <div className="sidebar-logo">
          <h1>Bank<span>ing</span></h1>
          <div style={{fontSize:12,color:'var(--text3)',marginTop:2}}>{settings.person1_name} & {settings.person2_name}</div>
        </div>
        <nav className="sidebar-nav">
          {nav.map(n=>(
            <button key={n.id} className={`nav-item ${page===n.id?'active':''}`} onClick={()=>setPage(n.id)}>
              <Icon name={n.icon} size={15}/>{n.label}
            </button>
          ))}
        </nav>
      </aside>
      <main className="main">
        {page==='dashboard'&&<Dashboard settings={settings}/>}
        {page==='transactions'&&<Transactions settings={settings} categories={categories} onCategoriesChange={loadCats}/>}
        {page==='import'&&<Import/>}
        {page==='settings'&&<Settings settings={settings} onSave={s=>setSettings(s)} categories={categories} onCategoriesChange={loadCats}/>}
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<ErrorBoundary><App/></ErrorBoundary>);
</script>
</body>
</html>
