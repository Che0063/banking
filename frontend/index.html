// ── Import Review Modal ───────────────────────────────────────────────────────
function ImportReviewModal({rows,skipped,onClose,onConfirm}){
  const dups=rows.filter(r=>r.duplicate_of);
  const [actions,setActions]=useState(()=>{
    const m={};rows.forEach((r,i)=>{m[i]=r.duplicate_of?'skip':'import';});return m;
  });
  // Editable value_dates (mobile date) per row index
  const [vdEdits,setVdEdits]=useState(()=>{const m={};rows.forEach((r,i)=>{m[i]=r.value_date||'';});return m;});
  const [saving,setSaving]=useState(false);
  const [curBal,setCurBal]=useState(null);
  const [targetBal,setTargetBal]=useState('');
  const [solveMsg,setSolveMsg]=useState('');
  const [sortByMobile,setSortByMobile]=useState(false);
  const [expandedDups,setExpandedDups]=useState(new Set());
  useEffect(()=>{authFetch(`${API}/api/summary`).then(r=>r.json()).then(d=>setCurBal(d));},[]);
  const setAction=(i,v)=>setActions(a=>({...a,[i]:v}));
  const setVd=(i,v)=>setVdEdits(a=>({...a,[i]:v}));
  const toggleDupExpand=i=>setExpandedDups(s=>{const n=new Set(s);n.has(i)?n.delete(i):n.add(i);return n;});

  const solveBalance=()=>{
    if(!curBal||targetBal==='')return;
    const target=parseFloat(targetBal);if(isNaN(target)){setSolveMsg('Enter a valid number.');return;}
    const baseAmt=rows.filter((_,i)=>!rows[i].duplicate_of).reduce((s,r)=>s+(r.amount||0),0);
    const dupRows=rows.map((r,i)=>({...r,_i:i})).filter(r=>r.duplicate_of);
    const n=Math.min(dupRows.length,20);const subDups=dupRows.slice(0,n);
    let bestDiff=Infinity,bestMask=0;
    for(let mask=0;mask<(1<<n);mask++){
      let da=0;for(let b=0;b<n;b++){if(mask&(1<<b))da+=subDups[b].amount||0;}
      const diff=Math.abs(curBal.shared_balance+baseAmt+da-target);
      if(diff<bestDiff){bestDiff=diff;bestMask=mask;}
    }
    const newA={...actions};
    rows.forEach((_,i)=>{if(!rows[i].duplicate_of)newA[i]='import';});
    subDups.forEach((r,b)=>{newA[r._i]=(bestMask&(1<<b))?'import':'skip';});
    dupRows.slice(n).forEach(r=>{newA[r._i]='skip';});
    setActions(newA);
    const finalAmt=rows.filter((_,i)=>newA[i]==='import').reduce((s,r)=>s+(r.amount||0),0);
    setSolveMsg(`Best: $${(curBal.shared_balance+finalAmt).toFixed(2)} (±$${bestDiff.toFixed(2)})`);
  };
  const setAllDups=v=>{const m={...actions};rows.forEach((r,i)=>{if(r.duplicate_of)m[i]=v;});setActions(m);};
  const importCount=Object.values(actions).filter(v=>v==='import').length;
  const replaceCount=Object.values(actions).filter(v=>v==='replace').length;

  const confirm=async()=>{
    setSaving(true);
    const payload=rows.map((r,i)=>({...r,value_date:vdEdits[i]||null,action:actions[i]}));
    await onConfirm(payload);setSaving(false);
  };

  // Build display rows: attach index to each row, then sort if needed
  const indexedRows=rows.map((r,i)=>({...r,_i:i,_vd:vdEdits[i]||r.value_date||''}));
  const sorted=sortByMobile?[...indexedRows].sort((a,b)=>{
    const ad=a._vd||a.date||'';const bd=b._vd||b.date||'';
    return ad<bd?-1:ad>bd?1:0;
  }):indexedRows;

  // Group by display date for demarcation
  const getGroupDate=r=>sortByMobile?(r._vd||r.date||''):(r.date||'');

  // Count existing DB transactions per date for context
  const [dbCounts,setDbCounts]=useState({});
  useEffect(()=>{
    // Get column values for dates to show counts
    authFetch(`${API}/api/transactions?limit=9999&sort_col=date&sort_dir=asc`).then(r=>r.json()).then(d=>{
      const counts={};
      (d.transactions||[]).forEach(t=>{
        const k=t.value_date||t.date;if(k)counts[k]=(counts[k]||0)+1;
      });
      setDbCounts(counts);
    });
  },[]);

  // Projected balance
  const toImportRows=rows.filter((_,i)=>actions[i]==='import');
  const dShared=toImportRows.reduce((s,r)=>s+(r.amount||0),0);
  const projShared=curBal?(curBal.shared_balance+dShared):null;

  // Render rows grouped with day dividers
  const renderedRows=[];let lastGroupDate='';
  sorted.forEach((r,si)=>{
    const i=r._i;const isDup=!!r.duplicate_of;const action=actions[i];
    const gd=getGroupDate(r);
    if(gd!==lastGroupDate){
      const dbCount=dbCounts[gd]||0;
      const pendingCount=sorted.filter(x=>getGroupDate(x)===gd).length;
      renderedRows.push(
        <tr key={`div-${gd}`}>
          <td colSpan={7} style={{padding:'4px 10px',background:'var(--surface2)',borderTop:'2px solid var(--border)',borderBottom:'1px solid var(--border)',fontSize:11,color:'var(--text2)',fontWeight:600,letterSpacing:'.3px'}}>
            <span style={{fontFamily:'DM Mono'}}>{gd?fmtDate(gd):'No date'}</span>
            <span style={{marginLeft:12,fontWeight:400,color:'var(--text3)'}}>
              {pendingCount} incoming · {dbCount} already in DB
            </span>
          </td>
        </tr>
      );
      lastGroupDate=gd;
    }
    const dupOf=r.duplicate_of;
    const isExpanded=expandedDups.has(i);
    renderedRows.push(
      <tr key={i} style={{background:isDup?(action==='skip'?'#fff5e6':'#fff9ed'):(action==='skip'?'#f8f8f8':'white'),borderLeft:isDup?'3px solid var(--warn)':'none'}}>
        <td style={{padding:'7px 8px',borderBottom:'1px solid var(--border)',fontFamily:'DM Mono',fontSize:10.5}}>{fmtDate(r.date)}</td>
        <td style={{padding:'7px 8px',borderBottom:'1px solid var(--border)'}}>
          <input type="date" value={vdEdits[i]} onChange={e=>setVd(i,e.target.value)}
            style={{fontFamily:'DM Mono',fontSize:10.5,border:'1px solid var(--border)',borderRadius:3,padding:'2px 4px',background:vdEdits[i]?'white':'#fff8f0',width:108,color:vdEdits[i]?'var(--text)':'var(--warn)'}}/>
        </td>
        <td style={{padding:'7px 8px',borderBottom:'1px solid var(--border)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',maxWidth:160,fontSize:12}}>{r.merchant}</td>
        <td style={{padding:'7px 8px',borderBottom:'1px solid var(--border)',fontFamily:'DM Mono',fontSize:11,textAlign:'right',color:r.amount<0?'var(--danger)':'var(--income)',whiteSpace:'nowrap'}}>{fmt(r.amount)}</td>
        <td style={{padding:'7px 8px',borderBottom:'1px solid var(--border)'}}><span className="badge badge-cat" style={{fontSize:10}}>{r.category}</span></td>
        <td style={{padding:'7px 8px',borderBottom:'1px solid var(--border)',minWidth:90}}>
          {isDup?(
            <button onClick={()=>toggleDupExpand(i)} style={{fontSize:10,padding:'2px 6px',border:'1px solid var(--warn)',borderRadius:3,background:'var(--warn-light)',color:'var(--warn)',cursor:'pointer',whiteSpace:'nowrap'}}>
              {isExpanded?'▲ Hide':'⚠ Dup of →'}
            </button>
          ):<span className="badge" style={{background:'var(--accent-light)',color:'var(--accent)',fontSize:10}}>New</span>}
        </td>
        <td style={{padding:'7px 8px',borderBottom:'1px solid var(--border)',minWidth:120}}>
          <div style={{display:'flex',gap:3,flexWrap:'wrap'}}>
            <button className={`btn btn-sm${action==='import'?' btn-primary':' btn-secondary'}`} style={{padding:'2px 7px',fontSize:10.5}} onClick={()=>setAction(i,'import')}>✓ Import</button>
            <button className={`btn btn-sm${action==='skip'?' btn-danger':' btn-secondary'}`} style={{padding:'2px 7px',fontSize:10.5}} onClick={()=>setAction(i,'skip')}>✕ Skip</button>
            {isDup&&<button className={`btn btn-sm${action==='replace'?' btn-primary':' btn-secondary'}`} style={{padding:'2px 7px',fontSize:10.5,background:action==='replace'?'#6c3483':'',borderColor:action==='replace'?'#6c3483':''}} onClick={()=>setAction(i,'replace')} title="Update existing transaction with this mobile date (fixes pending→finalised)">↻ Replace</button>}
          </div>
        </td>
      </tr>
    );
    // If expanded, show the existing DB transaction side-by-side
    if(isDup&&isExpanded&&dupOf){
      renderedRows.push(
        <tr key={`dup-detail-${i}`}>
          <td colSpan={7} style={{padding:'0 8px 8px 28px',borderBottom:'1px solid var(--border)',background:'#fffbf0'}}>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,padding:'8px 10px',background:'white',border:'1px solid #fce4b2',borderRadius:6,fontSize:12}}>
              <div>
                <div style={{fontSize:10.5,fontWeight:600,color:'var(--warn)',marginBottom:4,textTransform:'uppercase',letterSpacing:'.3px'}}>Incoming (CSV)</div>
                <div style={{fontFamily:'DM Mono',fontSize:11,marginBottom:2}}>Statement: {fmtDate(r.date)} · Mobile: {vdEdits[i]||<span style={{color:'var(--warn)'}}>Pending</span>}</div>
                <div style={{fontSize:12.5,fontWeight:500,marginBottom:1}}>{r.merchant}</div>
                <div style={{fontFamily:'DM Mono',color:r.amount<0?'var(--danger)':'var(--income)',fontSize:13,fontWeight:600}}>{fmt(r.amount)}</div>
                <div style={{fontSize:11,color:'var(--text3)',marginTop:2}}>{r.category}</div>
              </div>
              <div style={{borderLeft:'2px solid #fce4b2',paddingLeft:10}}>
                <div style={{fontSize:10.5,fontWeight:600,color:'var(--text2)',marginBottom:4,textTransform:'uppercase',letterSpacing:'.3px'}}>Existing in DB</div>
                <div style={{fontFamily:'DM Mono',fontSize:11,marginBottom:2}}>Statement: {fmtDate(dupOf.date)} · Mobile: {fmtDate(dupOf.value_date)||<span style={{color:'var(--warn)'}}>Pending</span>}</div>
                <div style={{fontSize:12.5,fontWeight:500,marginBottom:1}}>{dupOf.merchant}</div>
                <div style={{fontFamily:'DM Mono',color:dupOf.amount<0?'var(--danger)':'var(--income)',fontSize:13,fontWeight:600}}>{fmt(dupOf.amount)}</div>
                <div style={{fontSize:11,color:'var(--text3)',marginTop:2}}>{dupOf.category} {dupOf.person1_pct!=null?`· ${Math.round(dupOf.person1_pct*100)}/${Math.round(dupOf.person2_pct*100)}`:'· Pending split'}</div>
              </div>
            </div>
          </td>
        </tr>
      );
    }
  });

  return(<div className="overlay"><div className="modal modal-xl" style={{maxWidth:1080}}>
    <div className="mhdr">
      <h3>Review Import — {rows.length} rows</h3>
      <div style={{display:'flex',gap:8,alignItems:'center'}}>
        <label style={{fontSize:12.5,display:'flex',alignItems:'center',gap:5,cursor:'pointer',color:'var(--text2)'}}>
          <input type="checkbox" checked={sortByMobile} onChange={e=>setSortByMobile(e.target.checked)}/> Sort by mobile date
        </label>
        <button className="btn btn-ghost btn-sm" onClick={onClose}><I n="x"/></button>
      </div>
    </div>
    <div className="mbody" style={{padding:'12px 24px'}}>
      {/* Balance strip */}
      {curBal&&<div style={{display:'flex',gap:14,marginBottom:10,padding:'8px 12px',background:'var(--surface2)',borderRadius:'var(--radius-sm)',fontSize:12.5,flexWrap:'wrap',alignItems:'center'}}>
        <span style={{color:'var(--text3)',fontSize:12}}>After import ({importCount} rows):</span>
        <span><strong>Shared:</strong> <span className={projShared>=0?'amt-pos':'amt-neg'}>{projShared!=null?fmt(projShared):'—'}</span></span>
        <span><strong>P1:</strong> {fmt(curBal.person1_balance+toImportRows.reduce((s,r)=>r.person1_pct!=null?s+r.person1_pct*r.amount:s,0))}</span>
        <span><strong>P2:</strong> {fmt(curBal.person2_balance+toImportRows.reduce((s,r)=>r.person2_pct!=null?s+r.person2_pct*r.amount:s,0))}</span>
        <span style={{color:'var(--text3)',fontSize:11.5}}>({dShared>=0?'+':''}{dShared.toFixed(2)} net)</span>
      </div>}
      {/* Auto-solve for expected balance */}
      {dups.length>0&&<div style={{background:'var(--accent-light)',border:'1px solid #bdddd4',borderRadius:'var(--radius-sm)',padding:'8px 12px',marginBottom:8,display:'flex',alignItems:'center',gap:10,flexWrap:'wrap'}}>
        <span style={{fontSize:12.5,color:'var(--accent)',fontWeight:500}}>Target balance:</span>
        <input type="number" step="0.01" placeholder="Expected shared balance after import" value={targetBal} onChange={e=>setTargetBal(e.target.value)} style={{flex:1,minWidth:200,padding:'4px 8px',border:'1px solid var(--border)',borderRadius:'var(--radius-sm)',fontFamily:'DM Mono',fontSize:12.5}}/>
        <button className="btn btn-primary btn-sm" onClick={solveBalance}>Suggest duplicates</button>
        {solveMsg&&<span style={{fontSize:12,color:'var(--accent)',fontStyle:'italic'}}>{solveMsg}</span>}
      </div>}
      {/* xlsx date note */}
      {rows.length>0&&rows[0]._source==='xlsx'&&<div style={{background:'#eef2ff',border:'1px solid #c7d2fe',borderRadius:'var(--radius-sm)',padding:'8px 12px',marginBottom:8,fontSize:12.5,color:'#3730a3'}}>
        <strong>ℹ Spreadsheet import:</strong> The date column in your spreadsheet is the <strong>mobile/settlement date</strong>. It has been imported as both Statement and Mobile date. If you later import a CommBank CSV covering the same period, use <strong>↻ Replace</strong> on duplicates to attach the correct statement date to each transaction.
      </div>}
      {/* Dup controls */}
      {dups.length>0&&<div style={{display:'flex',alignItems:'center',justifyContent:'space-between',flexWrap:'wrap',gap:8,marginBottom:8,padding:'6px 10px',background:'var(--warn-light)',border:'1px solid #fce4b2',borderRadius:'var(--radius-sm)'}}>
        <span style={{fontSize:12.5,color:'var(--warn)',fontWeight:500}}><I n="warn" s={13}/> {dups.length} possible duplicate{dups.length!==1?'s':''} — expand "⚠ Dup of →" to compare · use <span style={{background:'#6c3483',color:'white',padding:'1px 5px',borderRadius:3,fontSize:10}}>↻ Replace</span> to update existing transaction's mobile date (pending→finalised)</span>
        <div style={{display:'flex',gap:6}}>
          <button className="btn btn-secondary btn-sm" onClick={()=>setAllDups('skip')}>Skip all dups</button>
          <button className="btn btn-secondary btn-sm" onClick={()=>setAllDups('import')}>Import all dups</button>
        </div>
      </div>}
      <div style={{overflowY:'auto',maxHeight:'58vh'}}>
        <table style={{width:'100%',fontSize:12.5,tableLayout:'auto',borderCollapse:'collapse',minWidth:700}}>
          <thead style={{position:'sticky',top:0,zIndex:2,background:'var(--surface)'}}>
            <tr>
              <th style={{padding:'7px 8px',borderBottom:'2px solid var(--border)',color:'var(--text3)',fontSize:10.5,textTransform:'uppercase',width:95,textAlign:'left'}}>Statement</th>
              <th style={{padding:'7px 8px',borderBottom:'2px solid var(--border)',color:'var(--text3)',fontSize:10.5,textTransform:'uppercase',width:116,textAlign:'left'}}>Mobile <span style={{fontSize:9,fontWeight:400}}>(editable)</span></th>
              <th style={{padding:'7px 8px',borderBottom:'2px solid var(--border)',color:'var(--text3)',fontSize:10.5,textTransform:'uppercase',textAlign:'left'}}>Merchant</th>
              <th style={{padding:'7px 8px',borderBottom:'2px solid var(--border)',color:'var(--text3)',fontSize:10.5,textTransform:'uppercase',width:80,textAlign:'right'}}>Amount</th>
              <th style={{padding:'7px 8px',borderBottom:'2px solid var(--border)',color:'var(--text3)',fontSize:10.5,textTransform:'uppercase',width:90}}>Category</th>
              <th style={{padding:'7px 8px',borderBottom:'2px solid var(--border)',color:'var(--text3)',fontSize:10.5,textTransform:'uppercase',width:90}}>Status</th>
              <th style={{padding:'7px 8px',borderBottom:'2px solid var(--border)',color:'var(--text3)',fontSize:10.5,textTransform:'uppercase',width:125}}>Action</th>
            </tr>
          </thead>
          <tbody>{renderedRows}</tbody>
        </table>
      </div>
      {skipped>0&&<p style={{fontSize:11.5,color:'var(--text3)',marginTop:6}}>{skipped} rows unparseable, excluded.</p>}
    </div>
    <div className="mfoot" style={{justifyContent:'space-between'}}>
      <span style={{fontSize:13,color:'var(--text2)'}}>{importCount} new · {replaceCount} replace · {Object.values(actions).filter(v=>v==='skip').length} skip</span>
      <div style={{display:'flex',gap:8}}>
        <button className="btn btn-secondary" onClick={onClose}>Cancel</button>
        <button className="btn btn-primary" onClick={confirm} disabled={saving||(importCount===0&&replaceCount===0)}>{saving?'Importing…':`Confirm ${importCount+replaceCount}`}</button>
      </div>
    </div>
  </div></div>);
}


// ── Dashboard ─────────────────────────────────────────────────────────────────
const COLORS=['#1a5276','#2d6a4f','#c0392b','#d4820a','#6c3483','#117a65','#784212','#1a252f','#0e6655','#7b241c','#4a235a','#b7770d'];

function Dashboard({settings}){
  const [sum,setSum]=useState(null);
  const curYear=String(new Date().getFullYear());
  const [fy,setFy]=useState(curYear);const [fm,setFm]=useState('');const [fc,setFc]=useState('');
  const [cats,setCats]=useState([]);
  const [chartView,setChartView]=useState('combined');
  const [balHistory,setBalHistory]=useState([]);
  const [yMin,setYMin]=useState('');const [yMax,setYMax]=useState('');
  const [byMin,setByMin]=useState('');const [byMax,setByMax]=useState('');

  useEffect(()=>{authFetch(`${API}/api/categories`).then(r=>r.json()).then(setCats);},[]);
  useEffect(()=>{
    let url=`${API}/api/summary`;const p=new URLSearchParams();
    if(fy)p.set('year',fy);if(fm)p.set('month',fm);if(fc)p.set('category',fc);
    if([...p].length)url+='?'+p.toString();
    authFetch(url).then(r=>r.json()).then(setSum);
  },[fy,fm,fc]);
  useEffect(()=>{
    const bp2=new URLSearchParams();if(fy)bp2.set('year',fy);if(fm)bp2.set('month',fm);
    const balUrl=`${API}/api/transactions/running-balance`+(bp2.toString()?'?'+bp2.toString():'');
    authFetch(balUrl).then(r=>r.json()).then(d=>{
      if(!Array.isArray(d)||d.length===0){setBalHistory([]);return;}
      const step=Math.max(1,Math.floor(d.length/120));
      const pts=[];
      for(let i=0;i<d.length;i+=step){
        const r=d[i];
        pts.push({date:fmtDate(r.date),Shared:r.shared_balance,[settings.person1_name]:r.person1_balance,[settings.person2_name]:r.person2_balance});
      }
      const last=d[d.length-1];
      if(pts[pts.length-1]?.date!==last.date)pts.push({date:fmtDate(last.date),Shared:last.shared_balance,[settings.person1_name]:last.person1_balance,[settings.person2_name]:last.person2_balance});
      setBalHistory(pts);
    });
  },[fy,fm]);

  if(!sum)return <div style={{padding:40,color:'var(--text3)'}}>Loading…</div>;

  const months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const catTotals=chartView==='p1'?sum.category_totals_p1:chartView==='p2'?sum.category_totals_p2:sum.category_totals;
  const catData=Object.entries(catTotals||{}).map(([k,v])=>({name:k,value:v}));
  const monthlyData=Object.entries(sum.monthly).map(([k,v])=>({month:k.slice(5),Income:+(v.income||0).toFixed(2),Expenses:+(v.expenses||0).toFixed(2),Net:+((v.income||0)-(v.expenses||0)).toFixed(2)})).slice(-12);
  const personData=Object.entries(sum.monthly_person||{}).map(([k,v])=>({month:k.slice(5),[settings.person1_name]:+(v.p1||0).toFixed(2),[settings.person2_name]:+(v.p2||0).toFixed(2)})).slice(-12);

  const Tt=({active,payload,label})=>{if(!active||!payload?.length)return null;return(<div style={{background:'white',border:'1px solid var(--border)',borderRadius:8,padding:'10px 14px',fontSize:13}}><p style={{fontWeight:600,marginBottom:4}}>{label}</p>{payload.map((p,i)=><p key={i} style={{color:p.fill||p.color}}>{p.name}: ${(p.value||0).toFixed(2)}</p>)}</div>);};
  const PieTt=({active,payload})=>{if(!active||!payload?.length)return null;const d=payload[0];const pct=d.payload?.percent;return(<div style={{background:'white',border:'1px solid var(--border)',borderRadius:8,padding:'10px 14px',fontSize:13}}><p style={{fontWeight:600,color:d.payload.fill,marginBottom:2}}>{d.name}</p><p>${(d.value||0).toFixed(2)}</p>{pct!=null&&!isNaN(pct)&&<p style={{color:'var(--text3)'}}>{(pct*100).toFixed(1)}%</p>}</div>);};

  return(<div>
    <div className="page-header"><div><h2>Dashboard</h2><p>Overview of your shared account</p></div></div>
    <div className="filter-row">
      <I n="filter" s={14}/>
      <select className="fsel" value={fy} onChange={e=>{setFy(e.target.value);setFm('');}}><option value="">All years</option>{(sum.available_years||[]).map(y=><option key={y} value={y}>{y}</option>)}</select>
      {fy&&<select className="fsel" value={fm} onChange={e=>setFm(e.target.value)}><option value="">All months</option>{months.map((m,i)=><option key={i+1} value={String(i+1).padStart(2,'0')}>{m}</option>)}</select>}
      <select className="fsel" value={fc} onChange={e=>setFc(e.target.value)}><option value="">All categories</option>{cats.map(c=><option key={c} value={c}>{c}</option>)}</select>
      {(fy||fm||fc)&&<button className="btn btn-ghost btn-sm" onClick={()=>{setFy('');setFm('');setFc('');}}>Clear</button>}
    </div>
    {sum.pending_count>0&&<div className="pending-banner"><I n="warn" s={16}/><span>{sum.pending_count} transaction{sum.pending_count!==1?'s':''} pending split</span></div>}
    <div className="stat-grid">
      <div className="stat-card"><div className="stat-label">Shared Balance</div><div className={`stat-value ${sum.shared_balance>=0?'positive':'negative'}`}>{fmt(sum.shared_balance)}</div><div className="stat-sub">Incl. starting balance</div></div>
      <div className="stat-card"><div className="stat-label">{settings.person1_name}</div><div className={`stat-value ${sum.person1_balance>=0?'positive':'negative'}`}>{fmt(sum.person1_balance)}</div><div className="stat-sub">Cumulative share</div></div>
      <div className="stat-card"><div className="stat-label">{settings.person2_name}</div><div className={`stat-value ${sum.person2_balance>=0?'positive':'negative'}`}>{fmt(sum.person2_balance)}</div><div className="stat-sub">Cumulative share</div></div>
      {sum.pending_count>0&&<div className="stat-card"><div className="stat-label">Pending</div><div className="stat-value warn">{sum.pending_count}</div><div className="stat-sub">Need split</div></div>}
    </div>
    {/* Charts */}
    <div style={{marginBottom:16}}>
      <div className="card card-padded">
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8,flexWrap:'wrap',gap:8}}>
          <div className="sec-title" style={{marginTop:0,marginBottom:0}}>Monthly Cash Flow</div>
          <div style={{display:'flex',gap:6,alignItems:'center',fontSize:12}}>
            <span style={{color:'var(--text3)'}}>Y:</span>
            <input type="number" placeholder="min" value={yMin} onChange={e=>setYMin(e.target.value)} style={{width:70,padding:'3px 6px',border:'1px solid var(--border)',borderRadius:4,fontSize:12}}/>
            <span style={{color:'var(--text3)'}}>–</span>
            <input type="number" placeholder="max" value={yMax} onChange={e=>setYMax(e.target.value)} style={{width:70,padding:'3px 6px',border:'1px solid var(--border)',borderRadius:4,fontSize:12}}/>
            {(yMin||yMax)&&<button onClick={()=>{setYMin('');setYMax('');}} style={{border:'none',background:'none',cursor:'pointer',color:'var(--text3)',fontSize:11}}>✕</button>}
          </div>
        </div>
        <p style={{fontSize:11.5,color:'var(--text3)',marginBottom:10}}>Bars = income &amp; expenses magnitude; line = net monthly surplus/deficit.</p>
        {(()=>{
          const cfMin=(yMin!==''&&!isNaN(Number(yMin)))?Number(yMin):null;
          const cfMax=(yMax!==''&&!isNaN(Number(yMax)))?Number(yMax):null;
          const cl=(v,mn,mx)=>{if(mx!=null&&v>mx)return mx;if(mn!=null&&v<mn)return mn;return v;};
          const cfData=monthlyData.map(d=>({...d,Income:cl(d.Income,cfMin,cfMax),Expenses:cl(d.Expenses,cfMin,cfMax),Net:cl(d.Net,cfMin,cfMax)}));
          const cfDataFull=cfMin!=null||cfMax!=null?[{month:'',Income:cfMin??0,Expenses:cfMin??0,Net:cfMin??0},...cfData,{month:'',Income:cfMax??0,Expenses:cfMax??0,Net:cfMax??0}]:cfData;
          return(<Recharts.ResponsiveContainer width="100%" height={220}>
            <Recharts.ComposedChart data={cfDataFull}>
              <Recharts.CartesianGrid strokeDasharray="3 3" stroke="var(--border)"/>
              <Recharts.XAxis dataKey="month" tick={{fontSize:11,fill:'var(--text3)'}} axisLine={false} tickLine={false}/>
              <Recharts.YAxis tick={{fontSize:10,fill:'var(--text3)'}} axisLine={false} tickLine={false} tickFormatter={v=>`$${v}`} width={60} domain={[cfMin!=null?cfMin:'auto',cfMax!=null?cfMax:'auto']}/>
              <Recharts.Tooltip content={({active,payload,label})=>{if(!label||!active||!payload?.length)return null;return(<div style={{background:'white',border:'1px solid var(--border)',borderRadius:8,padding:'10px 14px',fontSize:12.5}}><p style={{fontWeight:600,marginBottom:4,fontSize:11.5,color:'var(--text3)'}}>{label}</p>{payload.map((p,i2)=><p key={i2} style={{color:p.stroke||p.fill,margin:'2px 0'}}>{p.name}: <strong>${(p.value||0).toFixed(2)}</strong></p>)}</div>);}}/>
              <Recharts.Legend wrapperStyle={{fontSize:12}}/>
              <Recharts.Bar dataKey="Income" fill="#1a5276" radius={[3,3,0,0]} opacity={0.7}/>
              <Recharts.Bar dataKey="Expenses" fill="#c0392b" radius={[3,3,0,0]} opacity={0.7}/>
              <Recharts.Line type="monotone" dataKey="Net" stroke="#2d6a4f" strokeWidth={2.5} dot={{r:3}} activeDot={{r:5}}/>
            </Recharts.ComposedChart>
          </Recharts.ResponsiveContainer>);
        })()}
      </div>
    </div>

    {/* Balance history */}
    {balHistory.length>1&&<div className="card card-padded" style={{marginBottom:16}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8,flexWrap:'wrap',gap:8}}>
        <div className="sec-title" style={{marginTop:0,marginBottom:0}}>Account Balance Over Time</div>
        <div style={{display:'flex',gap:6,alignItems:'center',fontSize:12}}>
          <span style={{color:'var(--text3)'}}>Y:</span>
          <input type="number" placeholder="min" value={byMin} onChange={e=>setByMin(e.target.value)} style={{width:70,padding:'3px 6px',border:'1px solid var(--border)',borderRadius:4,fontSize:12}}/>
          <span style={{color:'var(--text3)'}}>–</span>
          <input type="number" placeholder="max" value={byMax} onChange={e=>setByMax(e.target.value)} style={{width:70,padding:'3px 6px',border:'1px solid var(--border)',borderRadius:4,fontSize:12}}/>
          {(byMin||byMax)&&<button onClick={()=>{setByMin('');setByMax('');}} style={{border:'none',background:'none',cursor:'pointer',color:'var(--text3)',fontSize:11}}>✕</button>}
        </div>
      </div>
      {(()=>{
        const bMin=(byMin!==''&&!isNaN(Number(byMin)))?Number(byMin):null;
        const bMax=(byMax!==''&&!isNaN(Number(byMax)))?Number(byMax):null;
        const clamp=(v,mn,mx)=>{if(mx!=null&&v>mx)return mx;if(mn!=null&&v<mn)return mn;return v;};
        // Filter to only points visible in range, then clamp boundary points
        let bData=balHistory.map(d=>({
          ...d,
          Shared:clamp(d.Shared,bMin,bMax),
          [settings.person1_name]:clamp(d[settings.person1_name],bMin,bMax),
          [settings.person2_name]:clamp(d[settings.person2_name],bMin,bMax),
        }));
        // Force Recharts to use exact domain by injecting invisible anchor points
        if(bMin!=null||bMax!=null){
          const anchor={date:'',Shared:bMin!=null?bMin:(bData[0]?.Shared||0),[settings.person1_name]:bMin!=null?bMin:0,[settings.person2_name]:bMin!=null?bMin:0};
          const anchor2={date:'',Shared:bMax!=null?bMax:(bData[bData.length-1]?.Shared||0),[settings.person1_name]:bMax!=null?bMax:0,[settings.person2_name]:bMax!=null?bMax:0};
          bData=[anchor,...bData,anchor2];
        }
        const domainMin=bMin!=null?bMin:'auto';
        const domainMax=bMax!=null?bMax:'auto';
        return(<Recharts.ResponsiveContainer width="100%" height={220}>
          <Recharts.LineChart data={bData}>
            <Recharts.CartesianGrid strokeDasharray="3 3" stroke="var(--border)"/>
            <Recharts.XAxis dataKey="date" tick={{fontSize:10,fill:'var(--text3)'}} axisLine={false} tickLine={false} interval="preserveStartEnd"/>
            <Recharts.YAxis tick={{fontSize:10,fill:'var(--text3)'}} axisLine={false} tickLine={false} tickFormatter={v=>`$${v}`} width={65} domain={[domainMin,domainMax]}/>
            <Recharts.Tooltip content={({active,payload,label})=>{if(!label||!active||!payload?.length)return null;return(<div style={{background:'white',border:'1px solid var(--border)',borderRadius:8,padding:'10px 14px',fontSize:12.5}}><p style={{fontWeight:600,marginBottom:4,fontSize:11.5,color:'var(--text3)'}}>{label}</p>{payload.map((p,i2)=><p key={i2} style={{color:p.stroke,margin:'2px 0'}}>{p.name}: <strong>${(p.value||0).toFixed(2)}</strong></p>)}</div>);}}/>
            <Recharts.Legend wrapperStyle={{fontSize:12}}/>
            <Recharts.Line type="monotone" dataKey="Shared" stroke="#2d6a4f" strokeWidth={2} dot={false}/>
            <Recharts.Line type="monotone" dataKey={settings.person1_name} stroke="#1a5276" strokeWidth={1.5} dot={false} strokeDasharray="4 2"/>
            <Recharts.Line type="monotone" dataKey={settings.person2_name} stroke="#7b241c" strokeWidth={1.5} dot={false} strokeDasharray="4 2"/>
          </Recharts.LineChart>
        </Recharts.ResponsiveContainer>);
      })()}
    </div>}

    {/* Spending by category - table */}
    <div className="card card-padded" style={{marginBottom:16}}>
      <div className="sec-title" style={{marginTop:0}}>Spending by Category</div>
      {catData.length===0?<div className="empty-state" style={{padding:16}}>No spending data</div>:(
        <table style={{width:'100%',fontSize:13,borderCollapse:'collapse'}}>
          <thead><tr>
            <th style={{textAlign:'left',padding:'6px 10px',borderBottom:'1px solid var(--border)',color:'var(--text3)',fontSize:11.5,textTransform:'uppercase'}}>Category</th>
            <th style={{textAlign:'right',padding:'6px 10px',borderBottom:'1px solid var(--border)',color:'var(--text3)',fontSize:11.5,textTransform:'uppercase'}}>Total</th>
            <th style={{textAlign:'right',padding:'6px 10px',borderBottom:'1px solid var(--border)',color:'var(--text3)',fontSize:11.5,textTransform:'uppercase'}}>{settings.person1_name}</th>
            <th style={{textAlign:'right',padding:'6px 10px',borderBottom:'1px solid var(--border)',color:'var(--text3)',fontSize:11.5,textTransform:'uppercase'}}>{settings.person2_name}</th>
            <th style={{padding:'6px 10px',borderBottom:'1px solid var(--border)',minWidth:120}}></th>
          </tr></thead>
          <tbody>{catData.map((d,i)=>{const tot=Object.values(sum.category_totals||{}).reduce((a,b)=>a+b,0)||1;const pct=d.value/tot;const p1v=(sum.category_totals_p1||{})[d.name]||0;const p2v=(sum.category_totals_p2||{})[d.name]||0;return(
            <tr key={d.name} style={{background:i%2===0?'white':'var(--surface2)'}}>
              <td style={{padding:'7px 10px',borderBottom:'1px solid var(--border)'}}><span style={{display:'inline-block',width:9,height:9,borderRadius:'50%',background:COLORS[i%COLORS.length],marginRight:7,verticalAlign:'middle'}}></span>{d.name}</td>
              <td style={{padding:'7px 10px',borderBottom:'1px solid var(--border)',textAlign:'right',fontFamily:'DM Mono',fontSize:12.5}}>${d.value.toFixed(2)}</td>
              <td style={{padding:'7px 10px',borderBottom:'1px solid var(--border)',textAlign:'right',fontFamily:'DM Mono',fontSize:12.5,color:'var(--text2)'}}>{p1v>0?`$${p1v.toFixed(2)}`:'—'}</td>
              <td style={{padding:'7px 10px',borderBottom:'1px solid var(--border)',textAlign:'right',fontFamily:'DM Mono',fontSize:12.5,color:'var(--text2)'}}>{p2v>0?`$${p2v.toFixed(2)}`:'—'}</td>
              <td style={{padding:'7px 10px 7px 14px',borderBottom:'1px solid var(--border)'}}><div style={{height:7,borderRadius:4,background:'var(--border)',overflow:'hidden'}}><div style={{height:'100%',width:`${Math.min(pct*100,100)}%`,background:COLORS[i%COLORS.length],borderRadius:4}}/></div></td>
            </tr>
          );})}
          <tr style={{fontWeight:600}}>
            <td style={{padding:'8px 10px'}}>Total</td>
            <td style={{padding:'8px 10px',textAlign:'right',fontFamily:'DM Mono',fontSize:12.5}}>${Object.values(sum.category_totals||{}).reduce((a,b)=>a+b,0).toFixed(2)}</td>
            <td style={{padding:'8px 10px',textAlign:'right',fontFamily:'DM Mono',fontSize:12.5,color:'var(--text2)'}}>${Object.values(sum.category_totals_p1||{}).reduce((a,b)=>a+b,0).toFixed(2)}</td>
            <td style={{padding:'8px 10px',textAlign:'right',fontFamily:'DM Mono',fontSize:12.5,color:'var(--text2)'}}>${Object.values(sum.category_totals_p2||{}).reduce((a,b)=>a+b,0).toFixed(2)}</td>
            <td></td>
          </tr>
          </tbody>
        </table>
      )}
    </div>

    {personData.length>0&&<div className="card card-padded" style={{marginBottom:16}}>
      <div className="sec-title" style={{marginTop:0}}>Monthly Income per Person</div>
      <Recharts.ResponsiveContainer width="100%" height={180}>
        <Recharts.BarChart data={personData} barGap={4}>
          <Recharts.CartesianGrid strokeDasharray="3 3" stroke="var(--border)"/>
          <Recharts.XAxis dataKey="month" tick={{fontSize:11,fill:'var(--text3)'}} axisLine={false} tickLine={false}/>
          <Recharts.YAxis tick={{fontSize:10,fill:'var(--text3)'}} axisLine={false} tickLine={false} tickFormatter={v=>`$${v}`} width={55}/>
          <Recharts.Tooltip content={<Tt/>}/>
          <Recharts.Legend wrapperStyle={{fontSize:12}}/>
          <Recharts.Bar dataKey={settings.person1_name} fill={COLORS[1]} radius={[3,3,0,0]}/>
          <Recharts.Bar dataKey={settings.person2_name} fill={COLORS[0]} radius={[3,3,0,0]}/>
        </Recharts.BarChart>
      </Recharts.ResponsiveContainer>
    </div>}
    <div className="balance-grid">
      <div className="balance-card p1"><div className="balance-name">{settings.person1_name}</div><div className="balance-amount">{fmt(sum.person1_balance)}</div><div className="stat-sub" style={{marginTop:4}}>Cumulative share (filtered)</div></div>
      <div className="balance-card p2"><div className="balance-name">{settings.person2_name}</div><div className="balance-amount">{fmt(sum.person2_balance)}</div><div className="stat-sub" style={{marginTop:4}}>Cumulative share (filtered)</div></div>
    </div>

    {/* Insights */}
    {(()=>{
      const insights=[];
      const allCats=sum.category_totals||{};
      const p1cats=sum.category_totals_p1||{};
      const p2cats=sum.category_totals_p2||{};
      const months=Object.keys(sum.monthly||{}).sort();
      // 1. Who's spending more on shared categories
      const sharedSpend={};
      Object.keys(allCats).forEach(cat=>{
        const p1=p1cats[cat]||0,p2=p2cats[cat]||0,tot=allCats[cat]||0;
        if(tot>0&&p1>0&&p2>0){
          const p1pct=Math.round(p1/tot*100),p2pct=100-p1pct;
          sharedSpend[cat]={p1,p2,p1pct,p2pct};
        }
      });
      // 2. Month-over-month expense trend
      if(months.length>=2){
        const last=sum.monthly[months[months.length-1]];
        const prev=sum.monthly[months[months.length-2]];
        const diff=(last.expenses||0)-(prev.expenses||0);
        if(Math.abs(diff)>20){
          insights.push({type:diff>0?'warn':'good',text:`Expenses ${diff>0?'up':'down'} $${Math.abs(diff).toFixed(0)} vs last month (${months[months.length-2].slice(5)} → ${months[months.length-1].slice(5)})`});
        }
      }
      // 3. Largest category this period
      const topCat=Object.entries(allCats).sort((a,b)=>b[1]-a[1])[0];
      if(topCat)insights.push({type:'info',text:`Biggest spend category: ${topCat[0]} ($${topCat[1].toFixed(0)})`});
      // 4. Uneven splits
      Object.entries(sharedSpend).forEach(([cat,{p1,p2,p1pct,p2pct}])=>{
        if(Math.abs(p1pct-p2pct)>30){
          const heavier=p1pct>p2pct?settings.person1_name:settings.person2_name;
          const heavierPct=Math.max(p1pct,p2pct);
          insights.push({type:'info',text:`${heavier} carries ${heavierPct}% of ${cat} spending`});
        }
      });
      // 5. Pending reminder
      if(sum.pending_count>0)insights.push({type:'warn',text:`${sum.pending_count} transactions still need a split assigned`});
      // 6. Income vs expense ratio
      const totalInc=Object.values(sum.monthly||{}).reduce((s,m)=>s+(m.income||0),0);
      const totalExp=Object.values(sum.monthly||{}).reduce((s,m)=>s+(m.expenses||0),0);
      if(totalInc>0&&totalExp>0){
        const ratio=totalExp/totalInc*100;
        if(ratio>90)insights.push({type:'warn',text:`Spending ${ratio.toFixed(0)}% of income — tight margin`});
        else if(ratio<50)insights.push({type:'good',text:`Spending only ${ratio.toFixed(0)}% of income — great savings rate`});
      }
      if(!insights.length)return null;
      return(<div className="card card-padded" style={{marginTop:16}}>
        <div className="sec-title" style={{marginTop:0}}>Insights</div>
        <div style={{display:'flex',flexDirection:'column',gap:8}}>
          {insights.map((ins,i)=>(
            <div key={i} style={{display:'flex',alignItems:'flex-start',gap:10,padding:'9px 12px',borderRadius:'var(--radius-sm)',background:ins.type==='warn'?'var(--warn-light)':ins.type==='good'?'var(--accent-light)':'var(--surface2)',border:`1px solid ${ins.type==='warn'?'#fce4b2':ins.type==='good'?'#bdddd4':'var(--border)'}`}}>
              <span style={{fontSize:15,lineHeight:1}}>{ins.type==='warn'?'⚠️':ins.type==='good'?'✓':'ℹ️'}</span>
              <span style={{fontSize:13.5,color:ins.type==='warn'?'var(--warn)':ins.type==='good'?'var(--accent)':'var(--text)'}}>{ins.text}</span>
            </div>
          ))}
        </div>
      </div>);
    })()}
  </div>);
}

// ── Transactions ──────────────────────────────────────────────────────────────
const DW={chk:36,date:110,vd:100,merchant:190,cat:110,notes:150,amt:100,p1:95,p2:95,split:65,sbal:110,act:72};
function Transactions({settings,categories}){
  const [data,setData]=useState({transactions:[],total:0,all_ids:[]});
  const [search,setSearch]=useState('');
  const [modal,setModal]=useState(null);
  const [toast,setToast]=useState('');
  const [page,setPage]=useState(0);
  const [pageSize,setPageSize]=useState(50);
  const [sel,setSel]=useState(new Set());
  const [selAll,setSelAll]=useState(false);
  const [sc,setSc]=useState('date');const [sd,setSd]=useState('desc');
  const [cw,setCw]=useState(DW);
  const [cf,setCf]=useState({});
  const [runBal,setRunBal]=useState({});

  const buildUrl=useCallback((ov={})=>{
    const o={page,pageSize,search,sc,sd,cf,...ov};
    let u=`${API}/api/transactions?limit=${o.pageSize}&offset=${o.page*o.pageSize}&sort_col=${o.sc}&sort_dir=${o.sd}`;
    if(o.search)u+=`&search=${encodeURIComponent(o.search)}`;
    const f=o.cf;
    if(f.date?.dateFrom)u+=`&date_from=${f.date.dateFrom}`;
    if(f.date?.dateTo)u+=`&date_to=${f.date.dateTo}`;
    if(f.merchant?.values?.length)u+=`&merchants=${f.merchant.values.join('|')}`;
    if(f.cat?.values?.length)u+=`&categories=${f.cat.values.join('|')}`;
    if(f.merchant?.text&&!f.merchant?.values?.length)u+=`&search=${encodeURIComponent(f.merchant.text)}`;
    if(f.notes?.text)u+=`&search=${encodeURIComponent(f.notes.text)}`;
    return u;
  },[page,pageSize,search,sc,sd,cf]);

  const load=useCallback(()=>{
    authFetch(buildUrl()).then(r=>r.json()).then(d=>{setData(d);setSel(new Set());setSelAll(false);});
    authFetch(`${API}/api/transactions/running-balance`).then(r=>r.json()).then(d=>{const m={};if(Array.isArray(d))d.forEach(r=>{m[r.id]=r;});setRunBal(m);});
  },[buildUrl]);

  useEffect(()=>{load();},[load]);

  const sort=col=>{if(sc===col)setSd(d=>d==='asc'?'desc':'asc');else{setSc(col);setSd('asc');}setPage(0);};
  const filter=(col,f)=>{setCf(x=>({...x,[col]:f}));setPage(0);};
  const txs=data.transactions||[];const total=data.total||0;const tp=Math.ceil(total/pageSize)||1;

  const save=async(fd)=>{
    if(modal.tx?.id){await authFetch(`${API}/api/transactions/${modal.tx.id}`,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(fd)});setToast('Updated');}
    else{await authFetch(`${API}/api/transactions`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(fd)});setToast('Added');}
    load();
  };
  const del=async()=>{await authFetch(`${API}/api/transactions/${modal.tx.id}`,{method:'DELETE'});setToast('Deleted');setModal(null);load();};
  const bulkDel=async()=>{
    const ids=selAll?[...sel]:[...sel];
    if(!ids.length){setToast('Nothing selected');return;}
    const r=await authFetch(`${API}/api/transactions/bulk-delete`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({ids})}).then(x=>x.json());
    setToast(`Deleted ${r.deleted}`);setModal(null);setSel(new Set());setSelAll(false);load();
  };
  const bulkEdit=async(b)=>{
    const ids=selAll?data.all_ids:[...sel];
    await authFetch(`${API}/api/transactions/bulk-edit`,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({ids,...b})});
    setToast(`Updated ${ids.length}`);setModal(null);setSel(new Set());setSelAll(false);load();
  };
  const selectAllPages=async()=>{
    // Fetch all matching IDs and store them directly in sel
    const u=buildUrl({page:0,pageSize:99999,sc,sd})+'&select_all=true';
    const d=await authFetch(u).then(r=>r.json());
    const ids=d.all_ids||[];
    setSel(new Set(ids));
    setSelAll(true);
  };
  const togSel=id=>setSel(s=>{const n=new Set(s);n.has(id)?n.delete(id):n.add(id);return n;});
  const togPage=()=>setSel(s=>s.size===txs.length?new Set():new Set(txs.map(t=>t.id)));
  const resize=(col,w)=>setCw(c=>({...c,[col]:w}));
  // all_ids only populated when select_all=true fetch is done; fallback to sel.size
  const selCount=selAll?(data.all_ids.length||sel.size):sel.size;
  const hasF=Object.values(cf).some(f=>f&&(f.text||f.dateFrom||f.dateTo||(f.values&&f.values.length)));

  const cols=[
    {key:'date',label:'Statement Date',sort:true,ct:'date',w:'date'},
    {key:'value_date',label:'Mobile Date',sort:true,ct:'date',w:'vd'},
    {key:'merchant',label:'Merchant',sort:true,ct:'values',w:'merchant'},
    {key:'category',label:'Category',sort:true,ct:'values',w:'cat'},
    {key:'notes',label:'Notes',sort:false,ct:'text',w:'notes'},
    {key:'amount',label:'Amount',sort:true,ct:null,w:'amt'},
    {key:'p1',label:settings.person1_name,sort:false,ct:null,w:'p1'},
    {key:'p2',label:settings.person2_name,sort:false,ct:null,w:'p2'},
    {key:'split',label:'Split',sort:false,ct:null,w:'split'},
    {key:'sbal',label:'Balance',sort:false,ct:null,w:'sbal'},
  ];

  return(<div>
    <div className="page-header">
      <div><h2>Transactions</h2><p>{total.toLocaleString()} total</p></div>
      <div style={{display:'flex',gap:8}}>
        {hasF&&<button className="btn btn-secondary btn-sm" onClick={()=>{setCf({});setPage(0);}}>Clear filters</button>}
        <button className="btn btn-primary" onClick={()=>setModal({type:'add'})}><I n="plus" s={14}/>Add</button>
      </div>
    </div>
    <div className="search-bar">
      <div className="search-wrap"><I n="search" s={14}/><input className="search-input" placeholder="Search…" value={search} onChange={e=>{setSearch(e.target.value);setPage(0);}}/></div>
      <div style={{marginLeft:'auto',display:'flex',alignItems:'center',gap:8}}>
        <span style={{fontSize:13,color:'var(--text3)'}}>Per page:</span>
        <select className="fsel" value={pageSize} onChange={e=>{setPageSize(Number(e.target.value));setPage(0);}}>
          {[25,50,100,200,500,1000].map(n=><option key={n} value={n}>{n}</option>)}
        </select>
      </div>
    </div>
    {selCount>0&&<div className="bulk-bar">
      <I n="warn" s={15}/>
      <span>{selCount} selected</span>
      {!selAll&&total>txs.length&&<button className="btn btn-secondary btn-sm" onClick={selectAllPages}>Select all {total}</button>}
      {selAll&&<span style={{fontSize:12}}>(all {total} pages)</span>}
      <button className="btn btn-secondary btn-sm" onClick={()=>setModal({type:'bulkedit'})}><I n="edit" s={13}/>Edit</button>
      <button className="btn btn-danger btn-sm" onClick={()=>setModal({type:'bulkdel'})}><I n="trash" s={13}/>Delete</button>
      <button className="btn btn-ghost btn-sm" onClick={()=>{setSel(new Set());setSelAll(false);}}>Deselect</button>
    </div>}
    <div className="card">
      <div className="table-outer">
        <table style={{minWidth:900}}>
          <thead><tr>
            <th style={{width:cw.chk}}><div className="th-inner"><input type="checkbox" checked={txs.length>0&&sel.size===txs.length} onChange={togPage}/></div></th>
            {cols.map(c=><RsTh key={c.key} colKey={c.key} label={c.label} width={cw[c.w]||100} onResize={w=>resize(c.w,w)} sortCol={sc} sortDir={sd} onSort={c.sort?sort:null} colType={c.ct} colFilter={cf[c.key]} onFilter={filter}/>)}
            <th style={{width:cw.act}}><div className="th-inner">Actions</div></th>
          </tr></thead>
          <tbody>
            {txs.length===0&&<tr><td colSpan={11}><div className="empty-state"><I n="list" s={32}/><p>No transactions found</p></div></td></tr>}
            {txs.map(tx=>(
              <tr key={tx.id} className={sel.has(tx.id)?'sel':''} style={{cursor:'pointer'}} onClick={e=>{if(e.target.tagName==='INPUT'||e.target.closest('button'))return;setModal({type:'edit',tx});}}>
                <td style={{width:cw.chk}}><input type="checkbox" checked={sel.has(tx.id)} onChange={()=>togSel(tx.id)}/></td>
                <td style={{width:cw.date}} className="mono">{fmtDate(tx.date)}</td>
                <td style={{width:cw.vd}} className="mono">{tx.value_date?fmtDate(tx.value_date):<span className="badge badge-pending">Pending</span>}</td>
                <td style={{width:cw.merchant,fontWeight:500}}>{tx.merchant}</td>
                <td style={{width:cw.cat}}><span className={`badge ${tx.is_transfer?'badge-transfer':tx.is_starting_balance?'badge-start':tx.category==='Unassigned'?'badge-pending':'badge-cat'}`} style={tx.category==='Unassigned'?{background:'#fee2e2',color:'#991b1b',border:'1px solid #fca5a5'}:{}}>{tx.category==='Unassigned'?'⚠ Unassigned':tx.category}</span></td>
                <td style={{width:cw.notes,color:'var(--text3)',fontSize:12.5}}>{tx.notes||'—'}</td>
                <td style={{width:cw.amt,textAlign:'right'}} className={`mono ${tx.amount<0?'amt-neg':'amt-pos'}`}>{fmt(tx.amount)}</td>
                <td style={{width:cw.p1,textAlign:'right'}} className="mono">{tx.is_pending?<span className="badge badge-pending">Pending</span>:tx.is_transfer||tx.is_starting_balance?'—':fmtAbs(tx.person1_amount)}</td>
                <td style={{width:cw.p2,textAlign:'right'}} className="mono">{tx.is_pending?<span className="badge badge-pending">Pending</span>:tx.is_transfer||tx.is_starting_balance?'—':fmtAbs(tx.person2_amount)}</td>
                <td style={{width:cw.split,textAlign:'right',fontFamily:'DM Mono',fontSize:12,color:'var(--text3)'}}>{tx.is_transfer||tx.is_starting_balance||tx.is_pending?'—':`${Math.round(tx.person1_pct*100)}/${Math.round(tx.person2_pct*100)}`}</td>
                <td style={{width:cw.sbal,textAlign:'right'}} className={`mono ${(runBal[tx.id]?.shared_balance||0)>=0?'amt-pos':'amt-neg'}`}>{runBal[tx.id]?fmtAbs(runBal[tx.id].shared_balance):'—'}</td>
                <td style={{width:cw.act}}><div style={{display:'flex',gap:3,justifyContent:'flex-end'}}>
                  <button className="btn btn-ghost btn-sm" onClick={()=>setModal({type:'edit',tx})}><I n="edit" s={13}/></button>
                  <button className="btn btn-ghost btn-sm" style={{color:'var(--danger)'}} onClick={()=>setModal({type:'del',tx})}><I n="trash" s={13}/></button>
                </div></td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
      <div className="pagination">
        <span style={{color:'var(--text3)'}}>Showing {page*pageSize+1}–{Math.min((page+1)*pageSize,total)} of {total}</span>
        <div style={{display:'flex',gap:5}}>
          <button className="btn btn-secondary btn-sm" onClick={()=>setPage(0)} disabled={page===0}>«</button>
          <button className="btn btn-secondary btn-sm" onClick={()=>setPage(p=>p-1)} disabled={page===0}>← Prev</button>
          <span style={{padding:'5px 8px'}}>Page {page+1}/{tp}</span>
          <button className="btn btn-secondary btn-sm" onClick={()=>setPage(p=>p+1)} disabled={page+1>=tp}>Next →</button>
          <button className="btn btn-secondary btn-sm" onClick={()=>setPage(tp-1)} disabled={page+1>=tp}>»</button>
        </div>
      </div>
    </div>
    {(modal?.type==='add'||modal?.type==='edit')&&<TxModal tx={modal.tx} onClose={()=>setModal(null)} onSave={save} settings={settings} categories={categories}/>}
    {modal?.type==='del'&&<div className="overlay" onClick={e=>e.target===e.currentTarget&&setModal(null)}><div className="modal" style={{maxWidth:420}}><div className="mhdr"><h3>Delete Transaction</h3><button className="btn btn-ghost btn-sm" onClick={()=>setModal(null)}><I n="x"/></button></div><div className="mbody"><p style={{fontSize:14,color:'var(--text2)',marginBottom:8}}>Delete <strong>{modal.tx.merchant}</strong> ({fmtAbs(modal.tx.amount)} on {fmtDate(modal.tx.date)})?</p><p style={{fontSize:13,color:'var(--danger)',fontWeight:500}}>This action cannot be undone.</p></div><div className="mfoot"><button className="btn btn-secondary" onClick={()=>setModal(null)}>Cancel</button><button className="btn btn-danger" onClick={del}>Delete permanently</button></div></div></div>}
    {modal?.type==='bulkdel'&&<div className="overlay" onClick={e=>e.target===e.currentTarget&&setModal(null)}><div className="modal" style={{maxWidth:420}}><div className="mhdr"><h3>Delete {selCount} Transactions</h3><button className="btn btn-ghost btn-sm" onClick={()=>setModal(null)}><I n="x"/></button></div><div className="mbody"><p style={{fontSize:14,color:'var(--text2)',marginBottom:8}}>Delete <strong>{selCount} selected transactions</strong>?</p><p style={{fontSize:13,color:'var(--danger)',fontWeight:500}}>This action cannot be undone.</p></div><div className="mfoot"><button className="btn btn-secondary" onClick={()=>setModal(null)}>Cancel</button><button className="btn btn-danger" onClick={bulkDel}>Delete {selCount} permanently</button></div></div></div>}
    {modal?.type==='bulkedit'&&<BulkEditModal count={selCount} categories={categories} settings={settings} onClose={()=>setModal(null)} onSave={bulkEdit}/>}
    {toast&&<Toast msg={toast} onDone={()=>setToast('')}/>}
  </div>);
}

// ── Import ────────────────────────────────────────────────────────────────────
function ImportPage(){
  const [file,setFile]=useState(null);
  const [type,setType]=useState(null); // 'commbank'|'xlsx'
  const [sessions,setSessions]=useState([]);
  const [sessionLoaded,setSessionLoaded]=useState(false);
  const loadSessions=()=>authFetch(`${API}/api/import/sessions`).then(r=>r.json()).then(setSessions);
  useEffect(()=>{loadSessions();},[]);
  const [parsing,setParsing]=useState(false);
  const [review,setReview]=useState(null); // {rows,skipped}
  const [result,setResult]=useState(null);
  const [err,setErr]=useState('');
  const [toast,setToast]=useState('');
  // Attach statement dates tool
  const [attachFile,setAttachFile]=useState(null);
  const [attachResult,setAttachResult]=useState(null);
  const [attaching,setAttaching]=useState(false);

  const parse=async(f,t)=>{
    setParsing(true);setErr('');setReview(null);setResult(null);
    const fd=new FormData();fd.append('file',f);
    const endpoint=t==='commbank'?'/api/import/commbank/parse':'/api/import/xlsx/parse';
    try{const r=await authFetch(`${API}${endpoint}`,{method:'POST',body:fd});const d=await r.json();if(d.detail)setErr(d.detail);else setReview(d);}
    catch{setErr('Parse failed.');}
    setParsing(false);
  };

  const undoSession=async(id)=>{if(!window.confirm('Undo this import? This will delete all transactions from that batch.'))return;await authFetch(`${API}/api/import/sessions/${id}`,{method:'DELETE'});setToast('Import undone');loadSessions();};
  const confirm=async(rows)=>{
    const r=await authFetch(`${API}/api/import/confirm`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({rows})});
    const d=await r.json();
    setReview(null);setResult(d);setFile(null);setType(null);
    setToast(`Imported ${d.imported} transactions`);
    loadSessions();
  };

  const pick=(f,t)=>{setFile(f);setType(t);setReview(null);setResult(null);setErr('');};

  const runAttachDates=async()=>{
    if(!attachFile)return;
    setAttaching(true);setAttachResult(null);setErr('');
    const fd=new FormData();fd.append('file',attachFile);
    try{
      const r=await authFetch(`${API}/api/import/attach-statement-dates`,{method:'POST',body:fd});
      const d=await r.json();
      if(d.detail)setErr(d.detail);else{setAttachResult(d);setToast(`Updated ${d.updated} statement dates`);}
    }catch{setErr('Attach failed.');}
    setAttaching(false);
  };;

  return(<div>
    <div className="page-header"><div><h2>Import</h2><p>Bring in data from CommBank or your spreadsheet</p></div></div>
    {!review&&<div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:16}}>
      <div className="card card-padded">
        <div className="sec-title" style={{marginTop:0}}>Import Spreadsheet (.xlsx)</div>
        <ol style={{color:'var(--text2)',fontSize:13,lineHeight:2.2,paddingLeft:16,marginBottom:16}}><li>Use your existing <strong>transactions.xlsx</strong></li><li>Reads Date, Amount, splits, Merchant, Notes, Category</li><li>Existing splits preserved — blanks marked Pending</li><li>You'll review duplicates before confirming</li></ol>
        <label className="upload-area" onDragOver={e=>e.preventDefault()} onDrop={e=>{e.preventDefault();pick(e.dataTransfer.files[0],'xlsx');}}>
          <input type="file" accept=".xlsx" style={{display:'none'}} onChange={e=>pick(e.target.files[0],'xlsx')}/>
          <I n="upload" s={26}/><p>{type==='xlsx'&&file?file.name:'Click or drag & drop'}</p><small>.xlsx files only</small>
        </label>
        {type==='xlsx'&&file&&!review&&<button className="btn btn-primary" style={{marginTop:12}} onClick={()=>parse(file,'xlsx')} disabled={parsing}>{parsing?'Parsing…':'Review Import'}</button>}
      </div>
      <div className="card card-padded">
        <div className="sec-title" style={{marginTop:0}}>Import CommBank CSV</div>
        <ol style={{color:'var(--text2)',fontSize:13,lineHeight:2.2,paddingLeft:16,marginBottom:16}}><li>Log in to <strong>NetBank</strong></li><li>Go to shared account → <strong>Transaction History</strong></li><li>Select date range → <strong>Export → CSV</strong></li><li>You'll review duplicates before confirming</li></ol>
        <label className="upload-area" onDragOver={e=>e.preventDefault()} onDrop={e=>{e.preventDefault();pick(e.dataTransfer.files[0],'commbank');}}>
          <input type="file" accept=".csv" style={{display:'none'}} onChange={e=>pick(e.target.files[0],'commbank')}/>
          <I n="upload" s={26}/><p>{type==='commbank'&&file?file.name:'Click or drag & drop'}</p><small>CommBank CSV export</small>
        </label>
        {type==='commbank'&&file&&!review&&<button className="btn btn-primary" style={{marginTop:12}} onClick={()=>parse(file,'commbank')} disabled={parsing}>{parsing?'Parsing…':'Review Import'}</button>}
      </div>
      <div className="card card-padded">
        <div className="sec-title" style={{marginTop:0}}>Attach Statement Dates</div>
        <p style={{fontSize:13,color:'var(--text2)',marginBottom:8,lineHeight:1.6}}>Already imported from your spreadsheet? Upload a CommBank CSV to fill in the missing <strong>statement dates</strong> for matched transactions. Nothing is created or deleted — only statement dates are updated.</p>
        <ol style={{color:'var(--text2)',fontSize:13,lineHeight:2.2,paddingLeft:16,marginBottom:16}}><li>Import your xlsx spreadsheet first</li><li>Export matching date range from CommBank as CSV</li><li>Upload here to match by <strong>amount + merchant + mobile date</strong></li></ol>
        <label className="upload-area" onDragOver={e=>e.preventDefault()} onDrop={e=>{e.preventDefault();setAttachFile(e.dataTransfer.files[0]);setAttachResult(null);}}>
          <input type="file" accept=".csv" style={{display:'none'}} onChange={e=>{setAttachFile(e.target.files[0]);setAttachResult(null);}}/>
          <I n="upload" s={26}/><p>{attachFile?attachFile.name:'Click or drag & drop'}</p><small>CommBank CSV</small>
        </label>
        {attachFile&&<button className="btn btn-primary" style={{marginTop:12}} onClick={runAttachDates} disabled={attaching}>{attaching?'Matching…':'Attach Statement Dates'}</button>}
        {attachResult&&<div style={{marginTop:10,padding:'8px 12px',background:'var(--accent-light)',borderRadius:'var(--radius-sm)',fontSize:13}}>
          <strong style={{color:'var(--accent)'}}>✓ Done:</strong> {attachResult.updated} statement dates attached, {attachResult.unmatched} unmatched.
          {attachResult.unmatched>0&&<div style={{marginTop:4,fontSize:12,color:'var(--text3)'}}>Unmatched rows may have different merchants or amounts — you can handle them manually via Edit on each transaction.</div>}
        </div>}
      </div>
    </div>}
    {result&&<div style={{marginTop:16,padding:16,background:'var(--accent-light)',borderRadius:'var(--radius)',border:'1px solid #bdddd4'}}><p style={{fontWeight:600,color:'var(--accent)',marginBottom:4}}>✓ Import complete</p><p style={{fontSize:13,color:'var(--text2)'}}>{result.imported} imported, {result.skipped} skipped.</p><button className="btn btn-secondary btn-sm" style={{marginTop:8}} onClick={()=>setResult(null)}>Import another</button></div>}
    {sessions.length>0&&!review&&<div className="card card-padded" style={{marginTop:20}}><div className="sec-title" style={{marginTop:0}}>Import History</div><p style={{fontSize:13,color:'var(--text2)',marginBottom:12}}>Undo removes all transactions from that import batch.</p><table style={{width:'100%',fontSize:13,borderCollapse:'collapse'}}><thead><tr><th style={{textAlign:'left',padding:'6px 10px',borderBottom:'1px solid var(--border)',color:'var(--text3)',fontSize:11.5,textTransform:'uppercase'}}>Date</th><th style={{textAlign:'left',padding:'6px 10px',borderBottom:'1px solid var(--border)',color:'var(--text3)',fontSize:11.5,textTransform:'uppercase'}}>Source</th><th style={{textAlign:'right',padding:'6px 10px',borderBottom:'1px solid var(--border)',color:'var(--text3)',fontSize:11.5,textTransform:'uppercase'}}>Count</th><th style={{padding:'6px 10px',borderBottom:'1px solid var(--border)'}}></th></tr></thead><tbody>{sessions.map(s=><tr key={s.id}><td style={{padding:'7px 10px',borderBottom:'1px solid var(--border)',fontFamily:'DM Mono',fontSize:12}}>{s.imported_at?.slice(0,16).replace('T',' ')}</td><td style={{padding:'7px 10px',borderBottom:'1px solid var(--border)',color:'var(--text2)'}}>{s.source||'—'}</td><td style={{padding:'7px 10px',borderBottom:'1px solid var(--border)',textAlign:'right'}}>{s.count}</td><td style={{padding:'7px 10px',borderBottom:'1px solid var(--border)',textAlign:'right'}}><button className="btn btn-danger btn-sm" onClick={()=>undoSession(s.id)}>Undo</button></td></tr>)}</tbody></table></div>}
    {err&&<p style={{color:'var(--danger)',fontSize:13,marginTop:12}}>{err}</p>}
    {review&&<ImportReviewModal rows={review.rows} skipped={review.skipped} onClose={()=>{setReview(null);}} onConfirm={confirm}/>}
    {toast&&<Toast msg={toast} onDone={()=>setToast('')}/>}
  </div>);
}

// ── Settings ──────────────────────────────────────────────────────────────────
function SettingsPage({settings,onSave,categories,onCategoriesChange}){
  const [names,setNames]=useState({person1_name:settings.person1_name,person2_name:settings.person2_name});
  const [saved,setSaved]=useState(false);
  const [p1bal,setP1bal]=useState('0');const [p2bal,setP2bal]=useState('0');
  const [dupCfg,setDupCfg]=useState({dup_match_date:true,dup_match_amount:true,dup_match_merchant:true,dup_date_tolerance:3,dup_merchant_threshold:90});
  const [newCat,setNewCat]=useState('');const [catErr,setCatErr]=useState('');
  const [editCat,setEditCat]=useState(null);const [editVal,setEditVal]=useState('');
  const [rules,setRules]=useState([]);
  const [newRule,setNewRule]=useState({pattern:'',category:categories[0]||'',use_regex:false});
  const [ruleErr,setRuleErr]=useState('');
  const [sugg,setSugg]=useState([]);const [showSugg,setShowSugg]=useState(false);
  const [preview,setPreview]=useState(null);
  const [toast,setToast]=useState('');

  useEffect(()=>{
    loadRules();
    authFetch(`${API}/api/settings`).then(r=>r.json()).then(d=>{
      setP1bal(d.person1_starting_balance||'0');setP2bal(d.person2_starting_balance||'0');
      setDupCfg({dup_match_date:d.dup_match_date!=='0',dup_match_amount:d.dup_match_amount!=='0',dup_match_merchant:d.dup_match_merchant!=='0',dup_date_tolerance:parseInt(d.dup_date_tolerance||'3'),dup_merchant_threshold:parseInt(d.dup_merchant_threshold||'90')});
    });
  },[]);

  const loadRules=()=>authFetch(`${API}/api/rules`).then(r=>r.json()).then(setRules);
  const saveNames=async()=>{await authFetch(`${API}/api/settings`,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(names)});onSave(names);setSaved(true);setTimeout(()=>setSaved(false),2000);};
  const saveBals=async()=>{await authFetch(`${API}/api/settings`,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({person1_starting_balance:parseFloat(p1bal)||0,person2_starting_balance:parseFloat(p2bal)||0})});setToast('Starting balances saved');};
  const saveDup=async()=>{await authFetch(`${API}/api/settings`,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({dup_match_date:dupCfg.dup_match_date?'1':'0',dup_match_amount:dupCfg.dup_match_amount?'1':'0',dup_match_merchant:dupCfg.dup_match_merchant?'1':'0',dup_date_tolerance:String(dupCfg.dup_date_tolerance),dup_merchant_threshold:String(dupCfg.dup_merchant_threshold)})});setToast('Duplicate settings saved');};
  const addCat=async()=>{if(!newCat.trim()){setCatErr('Name required.');return;}const r=await authFetch(`${API}/api/categories`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:newCat.trim()})});if(r.ok){setNewCat('');setCatErr('');onCategoriesChange();setToast('Category added');}else{const d=await r.json();setCatErr(d.detail||'Error');}};
  const delCat=async n=>{await authFetch(`${API}/api/categories/${encodeURIComponent(n)}`,{method:'DELETE'});onCategoriesChange();setToast(`"${n}" deleted`);};
  const renameCat=async()=>{if(!editVal.trim())return;await authFetch(`${API}/api/categories/${encodeURIComponent(editCat)}`,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:editVal.trim()})});setEditCat(null);onCategoriesChange();setToast('Renamed');};
  const addRule=async()=>{if(!newRule.pattern.trim()){setRuleErr('Pattern required.');return;}const r=await authFetch(`${API}/api/rules`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(newRule)});if(r.ok){setNewRule({pattern:'',category:categories[0]||'',use_regex:false});setRuleErr('');loadRules();setToast('Rule added');}else{const d=await r.json();setRuleErr(d.detail||'Error');}};
  const addSugg=async s=>{await authFetch(`${API}/api/rules`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({pattern:s.pattern,category:s.category,use_regex:false})});loadRules();setSugg(p=>p.filter(x=>x.pattern!==s.pattern));setToast('Rule added');};
  const delRule=async id=>{await authFetch(`${API}/api/rules/${id}`,{method:'DELETE'});loadRules();setToast('Rule deleted');};
  const togRule=async(id,en)=>{await authFetch(`${API}/api/rules/${id}`,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({enabled:en?1:0})});loadRules();};
  const previewApply=async()=>{const c=await authFetch(`${API}/api/rules/preview`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({scope:'pending'})}).then(r=>r.json());if(!c.length){setToast('No pending transactions would change.');return;}setPreview(c);};
  const applySelected=async ids=>{const r=await authFetch(`${API}/api/rules/apply`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({ids})}).then(r=>r.json());setPreview(null);setToast(`Updated ${r.updated} transactions`);};
  const loadSugg=()=>{
    Promise.all([
      authFetch(`${API}/api/rules/suggestions`).then(r=>r.json()),
      authFetch(`${API}/api/rules`).then(r=>r.json())
    ]).then(([suggestions, existing])=>{
      const existingPatterns=new Set((existing||[]).map(r=>r.pattern.toLowerCase()));
      const filtered=(suggestions||[]).filter(s=>!existingPatterns.has(s.pattern.toLowerCase()));
      setSugg(filtered);setShowSugg(true);
    });
  };

  const exportXlsx=()=>{ window.location.href=`${API}/api/export/xlsx?token=${getToken()}`; };

  return(<div>
    <div className="page-header"><div><h2>Settings</h2></div><button className="btn btn-secondary" onClick={exportXlsx}><I n="download" s={14}/>Export to Excel</button></div>
    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16,alignItems:'start'}}>

      <div className="card card-padded">
        <div className="sec-title" style={{marginTop:0}}>People</div>
        <div className="form-grid" style={{marginBottom:12}}>
          <div className="form-group"><label className="form-label">Person 1</label><input className="form-input" value={names.person1_name} onChange={e=>setNames(n=>({...n,person1_name:e.target.value}))}/></div>
          <div className="form-group"><label className="form-label">Person 2</label><input className="form-input" value={names.person2_name} onChange={e=>setNames(n=>({...n,person2_name:e.target.value}))}/></div>
        </div>
        <button className="btn btn-primary btn-sm" onClick={saveNames}>{saved?'✓ Saved':'Save Names'}</button>
      </div>

      <div className="card card-padded">
        <div className="sec-title" style={{marginTop:0}}>Starting Balances</div>
        <p style={{fontSize:13,color:'var(--text2)',marginBottom:12}}>Account balance per person at the point records begin.</p>
        <div className="form-grid form-2" style={{marginBottom:10}}>
          <div className="form-group"><label className="form-label">{names.person1_name||'Person 1'} ($)</label><input type="number" step="0.01" className="form-input" value={p1bal} onChange={e=>setP1bal(e.target.value)}/></div>
          <div className="form-group"><label className="form-label">{names.person2_name||'Person 2'} ($)</label><input type="number" step="0.01" className="form-input" value={p2bal} onChange={e=>setP2bal(e.target.value)}/></div>
        </div>
        <button className="btn btn-primary btn-sm" onClick={saveBals}>Save Balances</button>
      </div>

      <div className="card card-padded">
        <div className="sec-title" style={{marginTop:0}}>Duplicate Detection</div>
        <p style={{fontSize:13,color:'var(--text2)',marginBottom:12}}>Transactions matching on all checked fields are flagged during import.</p>
        <div style={{marginBottom:10}}>
          {[['dup_match_date','Same date (± tolerance days)'],['dup_match_amount','Same amount'],['dup_match_merchant','Similar merchant name']].map(([k,lbl])=>(
            <label key={k} style={{display:'flex',alignItems:'center',gap:8,fontSize:13.5,cursor:'pointer',marginBottom:8}}>
              <input type="checkbox" checked={dupCfg[k]} onChange={e=>setDupCfg(d=>({...d,[k]:e.target.checked}))}/>{lbl}
            </label>
          ))}
        </div>
        <div className="form-grid form-2" style={{marginBottom:12}}>
          <div className="form-group"><label className="form-label">Date tolerance (days ±)</label><input type="number" min="0" max="30" className="form-input" value={dupCfg.dup_date_tolerance} onChange={e=>setDupCfg(d=>({...d,dup_date_tolerance:parseInt(e.target.value)||0}))}/></div>
          <div className="form-group"><label className="form-label">Merchant match % (0–100)</label><input type="number" min="0" max="100" className="form-input" value={dupCfg.dup_merchant_threshold} onChange={e=>setDupCfg(d=>({...d,dup_merchant_threshold:parseInt(e.target.value)||0}))}/></div>
        </div>
        <button className="btn btn-primary btn-sm" onClick={saveDup}>Save</button>
      </div>

      <div className="card card-padded">
        <div className="sec-title" style={{marginTop:0}}>Categories</div>
        <div className="tag-list" style={{marginBottom:12}}>
          {categories.map(c=>(<div key={c} className="tag">{editCat===c?(<><input style={{border:'none',background:'transparent',fontFamily:'DM Sans',fontSize:12.5,width:90,outline:'none'}} value={editVal} onChange={e=>setEditVal(e.target.value)} onKeyDown={e=>{if(e.key==='Enter')renameCat();if(e.key==='Escape')setEditCat(null);}} autoFocus/><button onClick={renameCat} style={{color:'var(--accent)'}}>✓</button><button onClick={()=>setEditCat(null)}>✕</button></>):(<><span onClick={()=>{setEditCat(c);setEditVal(c);}} style={{cursor:'pointer'}}>{c}</span><button onClick={()=>delCat(c)}>×</button></>)}</div>))}
        </div>
        <div style={{display:'flex',gap:8}}><input className="form-input" placeholder="New category" value={newCat} onChange={e=>setNewCat(e.target.value)} onKeyDown={e=>e.key==='Enter'&&addCat()} style={{flex:1}}/><button className="btn btn-primary btn-sm" onClick={addCat}><I n="plus" s={13}/>Add</button></div>
        {catErr&&<p style={{color:'var(--danger)',fontSize:12.5,marginTop:6}}>{catErr}</p>}
        <p className="form-hint" style={{marginTop:8}}>Click a name to rename. Deleting moves transactions to "Other".</p>
      </div>

      <div className="card card-padded" style={{gridColumn:'1/-1'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12,flexWrap:'wrap',gap:8}}>
          <div className="sec-title" style={{marginTop:0,marginBottom:0}}>Categorisation Rules</div>
          <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
            <button className="btn btn-secondary btn-sm" onClick={loadSugg}><I n="zap" s={13}/>Suggest rules</button>
            <button className="btn btn-secondary btn-sm" onClick={previewApply}><I n="filter" s={13}/>Preview & apply to pending</button>
          </div>
        </div>
        {showSugg&&sugg.length>0&&<div style={{marginBottom:14,padding:14,background:'var(--accent-light)',borderRadius:'var(--radius)',border:'1px solid #bdddd4'}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
            <p style={{fontSize:13,fontWeight:600,color:'var(--accent)'}}>Suggested rules from your transaction history</p>
            <button className="btn btn-ghost btn-sm" onClick={()=>setShowSugg(false)}><I n="x" s={13}/></button>
          </div>
          {sugg.map(s=>(<div key={s.pattern} className="suggestion-row"><span style={{fontFamily:'DM Mono',fontSize:12.5,flex:1}}>{s.pattern}</span><span style={{color:'var(--text3)'}}>→</span><span style={{fontWeight:500,color:'var(--accent)',minWidth:80}}>{s.category}</span><span className="conf-badge">{Math.round(s.confidence*100)}%</span><span style={{fontSize:12,color:'var(--text3)',minWidth:50}}>{s.count} txns</span><button className="btn btn-primary btn-sm" onClick={()=>addSugg(s)}>Add</button></div>))}
        </div>}
        {showSugg&&sugg.length===0&&<p style={{fontSize:13,color:'var(--text3)',marginBottom:12}}>No new suggestions — good coverage already.</p>}
        {rules.length===0&&<p style={{color:'var(--text3)',fontSize:13,marginBottom:12}}>No rules yet.</p>}
        {rules.map(r=>(<div key={r.id} className="rule-row" style={{opacity:r.enabled?1:.5}}>
          <span style={{fontSize:11.5,color:'var(--text3)',minWidth:55}}>If merchant</span>
          <span style={{fontFamily:'DM Mono',fontSize:12,background:'var(--surface)',border:'1px solid var(--border)',padding:'2px 8px',borderRadius:4,flex:1,overflow:'hidden',textOverflow:'ellipsis'}}>{r.pattern}</span>
          <span style={{color:'var(--text3)'}}>→</span>
          <span style={{fontWeight:500,color:'var(--accent)',minWidth:80}}>{r.category}</span>
          <span style={{fontSize:10.5,padding:'2px 7px',borderRadius:100,background:'var(--border)',color:'var(--text2)'}}>{r.use_regex?'regex':'contains'}</span>
          <label style={{display:'flex',alignItems:'center',gap:4,fontSize:12,cursor:'pointer',color:'var(--text2)'}}><input type="checkbox" checked={!!r.enabled} onChange={e=>togRule(r.id,e.target.checked)}/>On</label>
          <button className="btn btn-ghost btn-sm" style={{color:'var(--danger)'}} onClick={()=>delRule(r.id)}><I n="trash" s={13}/></button>
        </div>))}
        <div style={{display:'grid',gridTemplateColumns:'1fr auto 1fr auto auto',gap:8,alignItems:'end',marginTop:12,padding:12,background:'var(--surface2)',borderRadius:'var(--radius-sm)'}}>
          <div className="form-group"><label className="form-label">Pattern</label><input className="form-input" placeholder="e.g. woolworths" value={newRule.pattern} onChange={e=>setNewRule(r=>({...r,pattern:e.target.value}))}/></div>
          <span style={{paddingBottom:10,color:'var(--text3)',fontWeight:600}}>→</span>
          <div className="form-group"><label className="form-label">Category</label><select className="form-select" value={newRule.category} onChange={e=>setNewRule(r=>({...r,category:e.target.value}))}>{categories.map(c=><option key={c}>{c}</option>)}</select></div>
          <div className="form-group" style={{justifyContent:'flex-end',paddingBottom:10}}><label style={{display:'flex',alignItems:'center',gap:6,fontSize:13,cursor:'pointer'}}><input type="checkbox" checked={newRule.use_regex} onChange={e=>setNewRule(r=>({...r,use_regex:e.target.checked}))}/>Regex</label></div>
          <div style={{paddingBottom:10}}><button className="btn btn-primary btn-sm" onClick={addRule}><I n="plus" s={13}/>Add</button></div>
        </div>
        {ruleErr&&<p style={{color:'var(--danger)',fontSize:12.5,marginTop:6}}>{ruleErr}</p>}
        <p className="form-hint" style={{marginTop:8}}>Rules apply top-to-bottom to new/pending transactions. Toggle "On" to disable without deleting. "Preview & apply to pending" only touches transactions without a split.</p>
      </div>
    </div>
    {preview&&<RulePreviewModal changes={preview} onClose={()=>setPreview(null)} onApply={applySelected}/>}
    {toast&&<Toast msg={toast} onDone={()=>setToast('')}/>}
  </div>);
}

// ── Error Boundary ────────────────────────────────────────────────────────────
class EB extends React.Component{
  constructor(p){super(p);this.state={err:null};}
  static getDerivedStateFromError(e){return{err:e};}
  render(){if(this.state.err)return <div style={{fontFamily:'sans-serif',padding:40,color:'#c0392b'}}><h2>Something went wrong</h2><pre style={{marginTop:12,fontSize:13,color:'#333',whiteSpace:'pre-wrap'}}>{this.state.err.message}</pre></div>;return this.props.children;}
}

// ── App ───────────────────────────────────────────────────────────────────────
function App(){
  const [authed,setAuthed]=useState(false);const [pwReq,setPwReq]=useState(false);const [ck,setCk]=useState(true);
  const [page,setPage]=useState('dashboard');
  const [settings,setSettings]=useState({person1_name:'Person 1',person2_name:'Person 2'});
  const [categories,setCategories]=useState([]);

  useEffect(()=>{
    fetch(`${API}/api/auth/check`,{headers:{'Authorization':`Bearer ${getToken()}`}})
      .then(r=>r.json()).then(d=>{setPwReq(d.password_required);if(d.ok)setAuthed(true);setCk(false);}).catch(()=>setCk(false));
  },[]);

  useEffect(()=>{
    if(!authed)return;
    authFetch(`${API}/api/settings`).then(r=>r.json()).then(setSettings);
    loadCats();
  },[authed]);

  const loadCats=()=>authFetch(`${API}/api/categories`).then(r=>r.json()).then(setCategories);

  if(ck)return null;
  if(!authed&&pwReq)return <LockScreen onUnlock={()=>setAuthed(true)}/>;
  if(!authed){
    fetch(`${API}/api/auth/login`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({password:''})}).then(r=>r.json()).then(d=>{setToken(d.token);setAuthed(true);});
    return null;
  }

  const nav=[{id:'dashboard',label:'Dashboard',icon:'home'},{id:'transactions',label:'Transactions',icon:'list'},{id:'import',label:'Import',icon:'upload'},{id:'settings',label:'Settings',icon:'settings'}];
  return(<div className="app">
    <aside className="sidebar">
      <div className="sidebar-logo"><h1>Bank<span>ing</span></h1><div style={{fontSize:12,color:'var(--text3)',marginTop:2}}>{settings.person1_name} & {settings.person2_name}</div></div>
      <nav className="sidebar-nav">{nav.map(n=><button key={n.id} className={`nav-item${page===n.id?' active':''}`} onClick={()=>setPage(n.id)}><I n={n.icon} s={15}/>{n.label}</button>)}</nav>
    </aside>
    <main className="main">
      {page==='dashboard'&&<Dashboard settings={settings}/>}
      {page==='transactions'&&<Transactions settings={settings} categories={categories}/>}
      {page==='import'&&<ImportPage/>}
      {page==='settings'&&<SettingsPage settings={settings} onSave={s=>setSettings(s)} categories={categories} onCategoriesChange={loadCats}/>}
    </main>
  </div>);
}
ReactDOM.createRoot(document.getElementById('root')).render(<EB><App/></EB>);
</script>
</body>
</html>
